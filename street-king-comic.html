<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦾 街頭霸主 - 漫畫風版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { 
  background: #000; 
  overflow: hidden; 
  touch-action: none;
  height: 100%;
  width: 100%;
}
body { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center;
  font-family: 'Courier New', monospace;
}
#gameWrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  max-width: 100vw;
  max-height: 60vh;
}
#hud {
  width: 100%;
  max-width: 960px;
  color: #ff0;
  font-size: 16px;
  padding: 4px 12px;
  background: #111;
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 4px;
  text-shadow: 1px 1px #000;
}
#hud span { white-space: nowrap; }

/* 手機操控區 */
#controls {
  width: 100%;
  max-width: 960px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  background: #111;
  gap: 8px;
  flex: 1;
}
#dpad {
  display: flex;
  gap: 4px;
}
.d-btn {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  border: 2px solid #ff6600;
  background: #1a1a1a;
  color: #ff6600;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.d-btn:active, .d-btn.active {
  background: #ff6600;
  color: #fff;
}
.d-btn:active {
  transform: scale(0.92);
}
#actionBtns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
  max-width: 200px;
}
.a-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 3px solid;
  font-size: 14px;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.a-btn:active { transform: scale(0.88); }
#btnJump {
  border-color: #00aaff;
  background: #002244;
  color: #00aaff;
}
#btnJump:active { background: #00aaff; color: #fff; }
#btnAttack {
  border-color: #ff3333;
  background: #440000;
  color: #ff3333;
}
#btnAttack:active { background: #ff3333; color: #fff; }
#btnPunch {
  border-color: #ffaa00;
  background: #442200;
  color: #ffaa00;
}
#btnPunch:active { background: #ffaa00; color: #fff; }

/* 角色狀態指示 */
#statusBar {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 4px;
  background: #0a0a0a;
  color: #888;
  font-size: 12px;
  width: 100%;
  max-width: 960px;
}

@media (max-width: 500px) {
  .d-btn { width: 50px; height: 50px; font-size: 18px; }
  .a-btn { width: 56px; height: 56px; font-size: 12px; }
}
</style>
</head>
<body>
<div id="gameWrap">
  <div id="hud">
    <span>❤️ <span id="hp">100</span></span>
    <span>💰 <span id="score">0</span></span>
    <span>🔥 <span id="kills">0</span></span>
    <span>🌊 <span id="wave">1</span></span>
    <span id="heroStatus">就緒</span>
  </div>

  <canvas id="game"></canvas>

  <div id="statusBar">
    <span>⬅️ ➡️ 移動</span>
    <span>🔵 跳</span>
    <span>🟠 踢</span>
    <span>🔴 拳</span>
  </div>

  <div id="controls">
    <!-- 方向鍵 -->
    <div id="dpad">
      <button class="d-btn" id="btnLeft">◀</button>
      <button class="d-btn" id="btnRight">▶</button>
    </div>

    <!-- 動作按鈕 -->
    <div id="actionBtns">
      <button class="a-btn" id="btnJump">跳</button>
      <button class="a-btn" id="btnPunch">踢</button>
      <button class="a-btn" id="btnAttack">拳</button>
    </div>
  </div>
</div>

<script>
// ==================== 遊戲核心引擎 ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 響應式畫布
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth, 960);
  const ratio = 960 / 540;
  canvas.width = maxW;
  canvas.height = maxW / ratio;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 遊戲狀態
let paused = false;
let gameOver = false;
let score = 0;
let kills = 0;
let wave = 1;
let enemies = [];
let particles = [];
let screenShake = 0;
let lastTime = 0;
let comboDisplayTimer = 0;

// 攻擊類型
const ATTACK = { PUNCH: 1, KICK: 2 };

// 英雄
const hero = {
  x: 100,
  y: 350,
  vx: 0,
  vy: 0,
  hp: 100,
  maxHp: 100,
  facing: 1,
  state: 'idle',
  attackType: 0,
  frame: 0,
  animTimer: 0,
  groundY: 350,
  combo: 0,
  invincible: 0,
  attackHit: false,
  w: 36,
  h: 64,
  attackReach: 50,
  attackDmg: 0,
  attackBox: null
};

// 敵人類型
const ENEMY_TYPES = [
  { name: 'thug', w: 36, h: 64, hp: 30, speed: 1.2, color: ['#f5c090', '#aa2222', '#334488', '#222'], dmg: 8, score: 10, range: 45 },
  { name: 'boxer', w: 40, h: 68, hp: 50, speed: 1.8, color: ['#f5c090', '#333388', '#222222', '#111'], dmg: 12, score: 20, range: 50 },
  { name: 'ninja', w: 32, h: 60, hp: 40, speed: 2.5, color: ['#f5c090', '#111', '#111', '#000'], dmg: 15, score: 25, range: 40 },
  { name: 'wrestler', w: 52, h: 76, hp: 80, speed: 0.8, color: ['#f5c090', '#881111', '#884400', '#333'], dmg: 20, score: 35, range: 55 },
];

function spawnEnemy() {
  const type = ENEMY_TYPES[Math.floor(Math.random() * Math.random() < 0.7 ? 2 : ENEMY_TYPES.length)];
  const groundY = 350 * (canvas.height / 540);
  const scale = canvas.height / 540;
  const e = {
    x: canvas.width + 50,
    y: groundY + (hero.h - type.h * scale),
    w: type.w * scale,
    h: type.h * scale,
    vx: 0,
    vy: 0,
    hp: type.hp + wave * 5,
    maxHp: type.hp + wave * 5,
    speed: type.speed,
    color: type.color,
    dmg: type.dmg,
    score: type.score,
    facing: -1,
    state: 'walk',
    frame: 0,
    animTimer: 0,
    attackCooldown: 0,
    type: type.name,
    hitFlash: 0,
    range: type.range * scale,
    groundY: groundY,
    isBoss: false,
    attacking: 0
  };
  enemies.push(e);
}

function spawnBoss() {
  const groundY = 350 * (canvas.height / 540);
  const scale = canvas.height / 540;
  const b = {
    x: canvas.width + 50,
    y: groundY,
    w: 72 * scale,
    h: 80 * scale,
    vx: 0,
    vy: 0,
    hp: 200 + wave * 80,
    maxHp: 200 + wave * 80,
    speed: 0.8,
    color: ['#f5c090', '#660066', '#440044', '#ff0000'],
    dmg: 25,
    score: 200,
    facing: -1,
    state: 'walk',
    frame: 0,
    animTimer: 0,
    attackCooldown: 0,
    type: 'BOSS',
    hitFlash: 0,
    range: 65 * scale,
    groundY: groundY,
    isBoss: true,
    attacking: 0
  };
  enemies.push(b);
}

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function addParticle(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      color,
      life: 30 + Math.random() * 20,
      size: 3 + Math.random() * 5
    });
  }
}

function addHitEffect(x, y) {
  for (let i = 0; i < 14; i++) {
    const angle = (i / 14) * Math.PI * 2;
    const speed = 3 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: '#ffff00',
      life: 15,
      size: 4 + Math.random() * 3
    });
  }
}

function addBlood(x, y, dir) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: dir * (1 + Math.random() * 3),
      vy: -(1 + Math.random() * 3),
      color: '#ff3333',
      life: 20 + Math.random() * 15,
      size: 4 + Math.random() * 4
    });
  }
}

function doAttack(type) {
  if (gameOver || paused || hero.state === 'hurt') return;
  hero.state = 'punch';
  hero.attackType = type;
  hero.frame = 0;
  hero.attackHit = false;
  hero.combo++;
  hero.invincible = Math.max(hero.invincible, 5);
  const baseDmg = type === ATTACK.PUNCH ? 12 : 15;
  hero.attackDmg = baseDmg + wave * 2 + Math.min(hero.combo, 5) * 3;
  screenShake = 3;
}

const sprites = {};
let spritesLoaded = 0;
const totalSprites = Object.keys(SPRITE_URLS).length;

Object.entries(SPRITE_URLS).forEach(([name, url]) => {
  const img = new Image();
  img.onload = () => {
    spritesLoaded++;
    sprites[name] = img;
  };
  img.onerror = () => {
    console.warn("Failed to load sprite:", name);
    sprites[name] = null;
    spritesLoaded++;
  };
  img.src = url;
});

// 新的精靈繪製函式
function drawSprite(ctx, x, y, w, h, name, facing, frame, state, attackType, hitFlash) {
  const scale = canvas.height / 540;
  const img = sprites[name];
  if (!img) return;
  
  ctx.save();
  ctx.translate(x + w/2, y + h);
  if (facing < 0) ctx.scale(-1, 1);
  ctx.scale(scale, scale);
  if (hitFlash > 0) ctx.filter = 'brightness(3)'; 
  
  // 120x160 原始尺寸
  const iw = 120, ih = 160;
  ctx.drawImage(img, -iw/2, -ih, iw, ih);
  
  ctx.filter = 'none';
  ctx.restore();
}

// 取得角色圖片名稱
function getHeroSprite(state, attackType) {
  if (state === 'punch') return attackType === 2 ? 'hero_kick' : 'hero_punch';
  return 'hero_idle';
}

function getEnemySprite(state, typeName, attacking) {
  if (attacking > 0) return typeName + '_attack';
  return typeName + '_idle';
}

// 舊的 drawPixelGuy（已停用）
function drawPixelGuy_disabled(ctx, x, y, w, h, colors, facing, frame, state, attackType) {
  const scale = canvas.height / 540;
  ctx.save();
  ctx.translate(x + w / 2, y + h);
  if (facing < 0) ctx.scale(-1, 1);
  ctx.scale(scale, scale);
  
  const f = Math.floor(frame) % 4;
  const isWalking = state === 'walk';
  const isJumping = state === 'jump';
  const isPunching = state === 'punch';
  const legOffset = isWalking ? Math.sin(f * Math.PI / 2) * 6 : (isJumping ? 4 : 0);
  const [skin, shirt, pants, hair] = colors;

  // 頭
  ctx.fillStyle = skin;
  ctx.fillRect(8, -64, 20, 20);
  ctx.fillStyle = hair;
  ctx.fillRect(8, -64, 20, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(22, -56, 4, 4);
  ctx.fillStyle = '#fff';
  ctx.fillRect(23, -55, 2, 2);

  // 身體
  ctx.fillStyle = shirt;
  ctx.fillRect(6, -44, 24, 22);

  // 手臂/攻擊
  ctx.fillStyle = skin;
  if (isPunching) {
    const reach = attackType === ATTACK.PUNCH ? 18 : 22;
    const kickY = attackType === ATTACK.PUNCH ? -30 : -20;
    if (attackType === ATTACK.PUNCH) {
      // 拳
      ctx.fillRect(28, -42, reach, 8);
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(44, -44, 16, 12);
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(46, -42, 12, 8);
    } else {
      // 踢腿
      ctx.fillRect(20, -28, 10, 20);
      ctx.fillStyle = pants;
      ctx.fillRect(22, -24, 14, 10);
      ctx.fillStyle = '#333';
      ctx.fillRect(30, -18, 12, 6);
    }
  } else {
    const armAngle = isWalking ? Math.sin(f * Math.PI / 2) * 20 : 0;
    ctx.save();
    ctx.translate(28, -38);
    ctx.rotate(armAngle * Math.PI / 180);
    ctx.fillRect(0, -3, 16, 6);
    ctx.restore();
    ctx.fillRect(2, -40, 10, 6);
  }

  // 腿
  ctx.fillStyle = pants;
  ctx.fillRect(8, -22, 8, 18 + legOffset);
  ctx.fillRect(20, -22, 8, 18 - legOffset);
  ctx.fillStyle = '#333';
  ctx.fillRect(6, -6 + legOffset, 10, 6);
  ctx.fillRect(18, -6 - legOffset, 10, 6);

  ctx.restore();
}

// ==================== 更新邏輯 ====================
let spawnTimer = 0;
let spawnInterval = 180;

function update() {
  if (paused || gameOver) return;
  
  const groundY = 350 * (canvas.height / 540);
  const scale = canvas.height / 540;
  
  // 重力
  hero.vy += 0.6 * scale;
  hero.y += hero.vy;
  hero.y = Math.min(hero.y, groundY + hero.h - 64 * scale);
  if (hero.y >= groundY + hero.h - 64 * scale) {
    hero.vy = 0;
    if (hero.state === 'jump') hero.state = 'idle';
  }
  
  hero.x += hero.vx;
  hero.x = Math.max(10, Math.min(canvas.width - hero.w - 10, hero.x));

  hero.animTimer++;
  if (hero.animTimer > 7) {
    hero.animTimer = 0;
    hero.frame++;
  }

  // 攻擊狀態
  if (hero.state === 'punch') {
    // 攻擊框
    const abox = {
      x: hero.facing > 0 ? hero.x + hero.w : hero.x - 50 * scale,
      y: hero.y + 10 * scale,
      w: 50 * scale,
      h: 40 * scale
    };
    hero.attackBox = abox;
    
    if (hero.frame >= 4 && !hero.attackHit) {
      hero.attackHit = true;
      enemies.forEach(e => {
        if (e.state !== 'dead' && aabb(abox, e)) {
          e.hp -= hero.attackDmg;
          e.hitFlash = 8;
          addHitEffect(e.x + e.w / 2, e.y + e.h / 3);
          addParticle(e.x + e.w / 2, e.y + e.h / 2, e.color[1], 6);
          screenShake = Math.max(screenShake, 5);
          if (e.hp <= 0) {
            e.state = 'dead';
            e.deathTimer = 40;
            score += e.score;
            kills++;
            document.getElementById('score').textContent = score;
            document.getElementById('kills').textContent = kills;
            comboDisplayTimer = 60;
          }
        }
      });
    }
    
    if (hero.frame > 6) {
      hero.state = 'idle';
      hero.attackBox = null;
      if (hero.combo > 3) hero.combo = 0;
    }
  }

  if (hero.invincible > 0) hero.invincible--;
  if (comboDisplayTimer > 0) comboDisplayTimer--;

  if (screenShake > 0) screenShake *= 0.85;

  // 地面同步
  hero.groundY = groundY;

  // 粒子
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; p.size *= 0.95;
    return p.life > 0 && p.size > 0.5;
  });

  // 波數
  if (kills > 0 && kills % 8 === 0) {
    const newWave = Math.floor(kills / 8) + 1;
    if (newWave > wave) {
      wave = newWave;
      spawnInterval = Math.max(35, 180 - wave * 15);
      document.getElementById('wave').textContent = wave;
      screenShake = 15;
    }
  }

  // 敵人生成
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnEnemy();
    if (wave >= 3 && Math.random() < 0.3) spawnEnemy();
    if (wave % 3 === 0 && enemies.filter(e => e.isBoss).length === 0 && kills > wave * 5) {
      spawnBoss();
    }
  }

  // 更新敵人
  enemies.forEach(e => {
    e.animTimer++;
    if (e.animTimer > 10) { e.animTimer = 0; e.frame++; }
    if (e.hitFlash > 0) e.hitFlash--;
    if (e.attacking > 0) e.attacking--;

    const ex = (hero.x + hero.w / 2);
    const ee = (e.x + e.w / 2);
    const dx = ex - ee;

    if (e.state !== 'dead') {
      e.vx = Math.sign(dx) * e.speed;
      e.facing = Math.sign(dx);
      const dist = Math.abs(dx);

      if (dist < e.range) {
        e.state = 'idle';
        if (e.attackCooldown <= 0 && hero.invincible <= 0) {
          hero.hp -= e.dmg;
          hero.invincible = 45;
          hero.state = 'hurt';
          hero.frame = 0;
          addBlood(hero.x + hero.w / 2, hero.y + 20 * scale, -e.facing);
          screenShake = 10;
          document.getElementById('hp').textContent = Math.max(0, Math.round(hero.hp));
          e.attacking = 20;
          if (hero.hp <= 0) { gameOver = true; saveGame(); }
        }
        e.attackCooldown = 50 + Math.random() * 40;
      } else {
        e.state = 'walk';
      }
      if (e.attackCooldown > 0) e.attackCooldown--;
    }

    if (e.state === 'dead') {
      e.deathTimer--;
      e.vy = -3;
      e.y += e.vy;
    }
  });

  enemies = enemies.filter(e => !(e.state === 'dead' && e.deathTimer <= 0));

  // 顯示狀態
  const statusEl = document.getElementById('heroStatus');
  if (hero.state === 'punch') statusEl.textContent = (hero.attackType === ATTACK.PUNCH ? '👊 拳擊' : '🦵 踢腿') + (hero.combo > 1 ? ' x' + hero.combo : '');
  else if (hero.state === 'hurt') statusEl.textContent = '💥 受傷!';
  else if (hero.state === 'jump') statusEl.textContent = '⬆️ 跳躍';
  else if (hero.state === 'walk') statusEl.textContent = '🚶 移動';
  else statusEl.textContent = '⚔️ 就緒';
}

// ==================== 繪製 ====================
function draw() {
  const W = canvas.width, H = canvas.height;
  const sx = screenShake > 0.5 ? (Math.random() - 0.5) * screenShake : 0;
  const sy = screenShake > 0.5 ? (Math.random() - 0.5) * screenShake : 0;
  ctx.save();
  ctx.translate(sx, sy);

  // 背景漸層
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#1a0a2e');
  grad.addColorStop(1, '#2a1a0a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星星
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 50; i++) {
    const rx = (i * 173) % W;
    const ry = (i * 47) % Math.floor(H * 0.45);
    ctx.globalAlpha = 0.3 + (i % 5) * 0.15;
    ctx.fillRect(rx, ry, i % 3 === 0 ? 2 : 1, i % 3 === 0 ? 2 : 1);
  }
  ctx.globalAlpha = 1;

  // 建築物
  const groundY = 350 * (H / 540);
  ctx.fillStyle = '#0d0d1a';
  const bld = [[0,0.38,0.083,0.62],[0.073,0.28,0.1,0.72],[0.167,0.4,0.063,0.6],[0.219,0.33,0.094,0.67],[0.3,0.44,0.073,0.56],[0.365,0.3,0.115,0.7],[0.469,0.38,0.083,0.62],[0.542,0.26,0.125,0.74],[0.656,0.35,0.094,0.65],[0.74,0.42,0.073,0.58],[0.8,0.31,0.1,0.69],[0.896,0.39,0.104,0.61]];
  bld.forEach(([bx, bh, bw, by]) => {
    const bw_px = bw * W, bh_px = bh * H, by_px = by * H, bx_px = bx * W;
    ctx.fillRect(bx_px, by_px - bh_px, bw_px, bh_px + H);
    ctx.fillStyle = '#ffff8844';
    for (let wy = by_px - bh_px + 10; wy < by_px; wy += 20) {
      for (let wx = bx_px + 4; wx < bx_px + bw_px - 4; wx += 14) {
        if (Math.random() > 0.35) ctx.fillRect(wx, wy, 7, 10);
      }
    }
    ctx.fillStyle = '#0d0d1a';
  });

  // 地面
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(0, groundY + 64 * (H / 540), W, H);
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(0, groundY + 64 * (H / 540), W, 3);
  ctx.fillStyle = '#222233';
  for (let gx = 0; gx < W; gx += 40) ctx.fillRect(gx, groundY + 68 * (H / 540), 20, 2);

  // 攻擊特效
  if (hero.state === 'punch' && hero.frame < 5) {
    const abox = hero.attackBox;
    if (abox) {
      ctx.fillStyle = 'rgba(255,200,0,0.3)';
      ctx.fillRect(abox.x, abox.y, abox.w, abox.h);
    }
  }

  // 敵人
  enemies.forEach(e => {
    ctx.globalAlpha = e.state === 'dead' ? e.deathTimer / 40 : 1;
    const col = e.hitFlash > 0 ? ['#fff', '#fff', '#fff', '#fff'] : e.color;
    drawSprite(ctx, e.x, e.y, e.w, e.h, getEnemySprite(e.state, e.type.toLowerCase(), e.attacking), e.facing, e.frame, e.state, 0, e.hitFlash);

    // HP 條
    if (e.hp < e.maxHp && e.state !== 'dead') {
      const bw = e.w;
      ctx.fillStyle = '#300';
      ctx.fillRect(e.x, e.y - 8, bw, 5);
      ctx.fillStyle = e.isBoss ? '#f00' : '#0f0';
      ctx.fillRect(e.x, e.y - 8, bw * (e.hp / e.maxHp), 5);
    }
    ctx.globalAlpha = 1;
  });

  // 英雄
  if (!gameOver) {
    ctx.globalAlpha = (hero.invincible > 0 && Math.floor(hero.invincible / 4) % 2) ? 0.35 : 1;
    const hscale = canvas.height / 540;
    drawSprite(ctx, hero.x, hero.y, hero.w, hero.h, getHeroSprite(hero.state, hero.attackType), hero.facing, hero.frame, hero.state, hero.attackType);

    // 血量條
    const hbW = 50 * hscale, hbH = 7 * hscale;
    ctx.fillStyle = '#300';
    ctx.fillRect(hero.x - 3, hero.y - 12 * hscale, hbW, hbH);
    ctx.fillStyle = hero.hp > 30 ? '#0c0' : '#f00';
    ctx.fillRect(hero.x - 3, hero.y - 12 * hscale, hbW * (hero.hp / hero.maxHp), hbH);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(hero.x - 3, hero.y - 12 * hscale, hbW, hbH);
    ctx.globalAlpha = 1;
  }

  // 粒子
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 15);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.restore();

  // 波數提示
  if (screenShake > 5) {
    ctx.fillStyle = '#ff0';
    ctx.font = `bold ${Math.round(40 * canvas.width / 960)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(`第 ${wave} 波`, W / 2, H / 2);
    ctx.font = `${Math.round(20 * canvas.width / 960)}px Courier New`;
    ctx.fillStyle = '#fff';
    ctx.fillText(`${kills} 擊殺`, W / 2, H / 2 + 35);
  }

  // COMBO
  if (comboDisplayTimer > 0 && hero.combo > 1) {
    ctx.globalAlpha = comboDisplayTimer / 60;
    ctx.fillStyle = '#ff0';
    ctx.font = `bold ${Math.round(28 * canvas.width / 960)}px Courier New`;
    ctx.textAlign = 'right';
    ctx.fillText(`COMBO x${hero.combo}!`, W - 20, 60);
    ctx.globalAlpha = 1;
  }

  // PAUSE
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff0';
    ctx.font = `bold ${Math.round(48 * canvas.width / 960)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText('⏸  暫  停', W / 2, H / 2);
    ctx.font = `${Math.round(20 * canvas.width / 960)}px Courier New`;
    ctx.fillStyle = '#aaa';
    ctx.fillText('點任一處繼續', W / 2, H / 2 + 45);
  }

  // GAME OVER
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3333';
    ctx.font = `bold ${Math.round(56 * canvas.width / 960)}px Courier New`;
    ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
    ctx.fillStyle = '#ff0';
    ctx.font = `${Math.round(24 * canvas.width / 960)}px Courier New`;
    ctx.fillText(`分數: ${score}  擊殺: ${kills}  波數: ${wave}`, W / 2, H / 2);
    const lastSave = loadGame();
    if (lastSave) {{
      ctx.fillStyle = '#aaf';
      ctx.font = `${Math.round(16 * canvas.width / 960)}px Courier New`;
      ctx.fillText(`上次: ${lastSave.score}/${lastSave.kills}/${lastSave.wave}`, W / 2, H / 2 + 28);
    }}
    ctx.fillStyle = '#0f0';
    ctx.font = `${Math.round(18 * canvas.width / 960)}px Courier New`;
    ctx.fillText('點任一處重新開始', W / 2, H / 2 + 50);
  }
}

// ==================== 輸入處理 ====================
// 鍵盤
const keys = {};
document.addEventListener('keydown', e => {
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (e.code === 'Space' && !gameOver) { paused = !paused; }
  if (e.code === 'KeyR' && gameOver) resetGame();
  if ((e.code === 'KeyZ' || e.code === 'KeyJ') && !paused) doAttack(ATTACK.PUNCH);
  if ((e.code === 'KeyX' || e.code === 'KeyK' || e.code === 'ArrowUp') && !paused) {
    if (hero.y >= hero.groundY + hero.h - 65 * (canvas.height/540)) {
      hero.vy = -12 * (canvas.height / 540);
      hero.state = 'jump';
    }
  }
  if (e.code === 'KeyC' && !paused) doAttack(ATTACK.KICK);
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// 鍵盤移動
setInterval(() => {
  if (paused || gameOver) return;
  hero.vx = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) {
    hero.vx = -4 * (canvas.width / 960);
    hero.facing = -1;
    if (hero.state !== 'jump' && hero.state !== 'punch') hero.state = 'walk';
  }
  if (keys['ArrowRight'] || keys['KeyD']) {
    hero.vx = 4 * (canvas.width / 960);
    hero.facing = 1;
    if (hero.state !== 'jump' && hero.state !== 'punch') hero.state = 'walk';
  }
  if (hero.state === 'walk' && hero.vx === 0 && hero.vy === 0 && hero.state !== 'jump') hero.state = 'idle';
}, 16);

// 觸控按鈕
function setupBtn(id, onStart, onEnd) {
  const el = document.getElementById(id);
  const start = (e) => { e.preventDefault(); el.classList.add('active'); onStart(); };
  const end = (e) => { e.preventDefault(); el.classList.remove('active'); if (onEnd) onEnd(); };
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', end, { passive: false });
  el.addEventListener('touchcancel', end, { passive: false });
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', end);
  el.addEventListener('mouseleave', end);
}

setupBtn('btnLeft', () => {
  hero.vx = -4 * (canvas.width / 960);
  hero.facing = -1;
  if (hero.state !== 'jump' && hero.state !== 'punch') hero.state = 'walk';
}, () => { hero.vx = 0; if (hero.state === 'walk') hero.state = 'idle'; });

setupBtn('btnRight', () => {
  hero.vx = 4 * (canvas.width / 960);
  hero.facing = 1;
  if (hero.state !== 'jump' && hero.state !== 'punch') hero.state = 'walk';
}, () => { hero.vx = 0; if (hero.state === 'walk') hero.state = 'idle'; });

setupBtn('btnJump', () => {
  const scale = canvas.height / 540;
  if (hero.y >= hero.groundY + hero.h - 65 * scale) {
    hero.vy = -12 * scale;
    hero.state = 'jump';
  }
});

setupBtn('btnAttack', () => doAttack(ATTACK.PUNCH));
setupBtn('btnPunch', () => doAttack(ATTACK.KICK));

// 暫停/重玩 點擊
canvas.addEventListener('click', () => {
  if (gameOver) { resetGame(); return; }
  if (paused) { paused = false; return; }
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (gameOver) { resetGame(); return; }
  if (paused) { paused = false; return; }
}, { passive: false });

// ==================== 重置 ====================
function resetGame() {
  const W = canvas.width, H = canvas.height;
  const scale = H / 540;
  hero.x = W * 0.15;
  hero.y = 350 * scale;
  hero.vx = 0; hero.vy = 0;
  hero.hp = 100; hero.maxHp = 100;
  hero.state = 'idle'; hero.frame = 0;
  hero.invincible = 0; hero.combo = 0;
  hero.attackBox = null; hero.attackHit = false;
  hero.groundY = 350 * scale;
  enemies = []; particles = [];
  score = 0; kills = 0; wave = 1;
  spawnTimer = 0; spawnInterval = 180;
  screenShake = 0; gameOver = false; paused = false;
  comboDisplayTimer = 0;
  document.getElementById('hp').textContent = 100;
  document.getElementById('score').textContent = 0;
  document.getElementById('kills').textContent = 0;
  document.getElementById('wave').textContent = 1;
}

// ==================== 遊戲循環 ====================

// ==================== 存檔系統 ====================
function saveGame() {{
  const saveData = {{ score, kills, wave }};
  localStorage.setItem('streetKing_save', JSON.stringify(saveData));
}}

function loadGame() {{
  try {{
    const data = localStorage.getItem('streetKing_save');
    return data ? JSON.parse(data) : null;
  }} catch(e) {{ return null; }}
}}

function gameLoop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  update(); draw();
  requestAnimationFrame(gameLoop);
}

resetGame();
requestAnimationFrame(gameLoop);
</script>
