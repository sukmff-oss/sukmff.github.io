<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚇 地鐵绝命先鋒 | Lv1-100 FPS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none}
#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hpbar{position:absolute;bottom:28px;left:18px;width:210px;height:18px;background:rgba(0,0,0,0.7);border:2px solid #0f8;border-radius:4px;overflow:hidden}
#hpfill{height:100%;background:linear-gradient(90deg,#0f8,#0ff);width:100%;transition:width .2s}
#hptext{position:absolute;bottom:50px;left:18px;font-size:13px;color:#0f8;text-shadow:0 0 8px #0f8}
#lvdisp{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:22px;font-weight:900;color:#FFD700;text-shadow:0 0 12px #FFD700,0 0 24px #f80}
#scdisp{position:absolute;top:14px;right:18px;font-size:15px;color:#fff;text-shadow:0 0 8px #fff}
#wpn{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:#aaa;letter-spacing:1px}
#xpp{position:absolute;top:48px;left:50%;transform:translateX(-50%);width:220px;height:8px;background:rgba(0,0,0,0.6);border:1px solid #555;border-radius:4px;overflow:hidden}
#xpfill{height:100%;background:linear-gradient(90deg,#f80,#ff0);width:0%;transition:width .3s}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:#FFD700;text-shadow:0 0 20px #FFD700;text-align:center;display:none;pointer-events:none}
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;z-index:20;pointer-events:none}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,0.85)}
#xhair::before{top:50%;left:0;width:100%;height:2px;margin-top:-1px}
#xhair::after{left:50%;top:0;height:100%;width:2px;margin-left:-1px}
#xhair .dot{position:absolute;top:50%;left:50%;width:4px;height:4px;background:#f00;border-radius:50%;transform:translate(-50%,-50%)}
#drone-panel{position:absolute;top:14px;left:18px;font-size:12px;color:#0ff;text-shadow:0 0 8px #0ff;line-height:1.6}
.drone-line{opacity:.85}
#dmg-flash{position:fixed;inset:0;background:rgba(255,0,0,.35);pointer-events:none;z-index:30;opacity:0;transition:opacity .08s}
#lv-splash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:56px;font-weight:900;color:#FFD700;text-shadow:0 0 30px #FFD700,0 0 60px #f80;z-index:40;display:none;pointer-events:none;white-space:nowrap}
#killfeed{position:fixed;top:80px;right:16px;font-size:12px;color:#0f8;text-align:right;pointer-events:none;z-index:15}
#enemy-hp-bar{position:absolute;display:none;width:60px;height:6px;background:rgba(0,0,0,0.7);border:1px solid #555;border-radius:3px;overflow:hidden}
#enemy-hp-fill{height:100%;background:linear-gradient(90deg,#f44,#f80);width:100%}
#enemy-hp-label{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;color:#f44;white-space:nowrap}
#menu{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50}
#menu h1{font-size:42px;color:#FFD700;text-shadow:0 0 20px #f80;margin-bottom:6px;letter-spacing:2px}
#menu .sub{font-size:13px;color:#888;margin-bottom:28px}
.menu-box{background:rgba(20,20,40,.85);border:2px solid #333;border-radius:16px;padding:24px 32px;text-align:center}
.menu-box h2{font-size:18px;color:#ccc;margin-bottom:14px}
.info-row{font-size:13px;color:#888;margin:4px 0}
.info-row span{color:#0f8}
.tip{font-size:12px;color:#555;margin-top:14px;line-height:1.7}
.btn{display:inline-block;padding:12px 36px;font-size:17px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin:6px;transition:all .15s;letter-spacing:1px}
.btn-primary{background:linear-gradient(180deg,#f80,#c60);color:#fff;text-shadow:0 1px 2px #000;box-shadow:0 4px 14px #f8080}
.btn-primary:hover{background:linear-gradient(180deg,#fa0,#e70);transform:translateY(-1px)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="lvdisp">LV <span id="lvnum">1</span></div>
  <div id="scdisp">分數 <span id="scnum">0</span></div>
  <div id="xpp"><div id="xpfill"></div></div>
  <div id="hptext">HP <span id="hpval">100</span> / <span id="hpmax">100</span></div>
  <div id="hpbar"><div id="hpfill"></div></div>
  <div id="wpn">RIFLE</div>
  <div id="drone-panel"></div>
  <div id="msg"></div>
  <div id="enemy-hp-bar"><div id="enemy-hp-label"></div><div id="enemy-hp-fill"></div></div>
</div>
<div id="xhair"><div class="dot"></div></div>
<div id="dmg-flash"></div>
<div id="lv-splash"></div>
<div id="killfeed"></div>
<div id="menu">
  <h1>🚇 地鐵绝命先鋒</h1>
  <div class="sub">Lv1~100 · 每10等解鎖自動導彈無人機</div>
  <div class="menu-box">
    <h2>操作說明</h2>
    <div class="info-row">🎯 <span>WASD</span> 移動 · <span>Mouse</span> 視角</div>
    <div class="info-row">🔥 <span>Left Click / Space</span> 射擊</div>
    <div class="info-row">🛸 <span>每10等</span> 解鎖一架導彈無人機</div>
    <div class="info-row">🤖 <span>Lv15+</span> 裝甲敵人無人機出現</div>
    <div class="info-row">🐉 <span>每20等</span> 魔王降臨</div>
    <div class="tip">🔫 等級越高子彈越強<br>🛸 無人機自動追蹤發射導彈<br>🤖 裝甲敵人有盾牌、會反擊導彈<br>💀 消滅魔王後進入下一個循環</div>
  </div>
  <button class="btn btn-primary" id="startBtn">開始遊戲</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
"use strict";
const G={lv:1,xp:0,score:0,kills:0,hp:100,maxHp:100};
const XP_BASE=120,XP_MUL=1.28;
function xpForLevel(lv){return Math.floor(XP_BASE*Math.pow(XP_MUL,lv-1));}
let audioCtx=null;
function ensureAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
function playSound(type){try{if(!audioCtx)return;const ctx=audioCtx,now=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);if(type==='shoot'){o.type='square';o.frequency.setValueAtTime(220,now);o.frequency.exponentialRampToValueAtTime(80,now+0.06);g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.06);o.start(now);o.stop(now+0.06);}else if(type==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(60,now+0.12);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);o.start(now);o.stop(now+0.12);}else if(type==='kill'){o.type='sawtooth';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(1200,now+0.08);o.frequency.exponentialRampToValueAtTime(300,now+0.25);g.gain.setValueAtTime(0.22,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);o.start(now);o.stop(now+0.25);}else if(type==='levelup'){[523,659,784,1047].forEach((f,i)=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.type='triangle';o2.frequency.setValueAtTime(f,now+i*0.12);g2.gain.setValueAtTime(0.2,now+i*0.12);g2.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.22);o2.start(now+i*0.12);o2.stop(now+i*0.12+0.22);});}else if(type==='boss'){o.type='sawtooth';o.frequency.setValueAtTime(80,now);o.frequency.exponentialRampToValueAtTime(200,now+1.5);g.gain.setValueAtTime(0.35,now);g.gain.exponentialRampToValueAtTime(0.001,now+2);o.start(now);o.stop(now+2);}else if(type==='explode'){o.type='sawtooth';o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(20,now+0.4);g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.4);o.start(now);o.stop(now+0.4);}else if(type==='shoot_missile'){o.type='sawtooth';o.frequency.setValueAtTime(800,now);o.frequency.exponentialRampToValueAtTime(400,now+0.08);g.gain.setValueAtTime(0.12,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);o.start(now);o.stop(now+0.08);}else if(type==='armor_hit'){o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(200,now+0.08);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);o.start(now);o.stop(now+0.08);}else if(type==='enemy_missile'){o.type='square';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(600,now+0.15);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);o.start(now);o.stop(now+0.15);}}catch(e){}}

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a12);
scene.fog=new THREE.FogExp2(0x0a0a12,0.025);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,200);
camera.position.set(0,1.7,0);
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
resize();window.addEventListener('resize',resize);
scene.add(new THREE.AmbientLight(0x334466,0.6));
const sunLight=new THREE.DirectionalLight(0x8899bb,0.8);sunLight.position.set(10,20,10);sunLight.castShadow=true;sunLight.shadow.mapSize.set(1024,1024);scene.add(sunLight);
const fillLight=new THREE.PointLight(0x223366,0.5,30);fillLight.position.set(-5,5,-5);scene.add(fillLight);
const floorMat=new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.9,metalness:0.1});
const wallMat=new THREE.MeshStandardMaterial({color:0x22223a,roughness:0.7,metalness:0.2});
const pillarMat=new THREE.MeshStandardMaterial({color:0x2a2a4a,roughness:0.6,metalness:0.3});
const railMat=new THREE.MeshStandardMaterial({color:0x888888,roughness:0.3,metalness:0.9});
const ceilingMat=new THREE.MeshStandardMaterial({color:0x111122,roughness:0.95});
function buildMetro(){
  const W=14,H=6,corridorLen=90;
  const floorGeo=new THREE.PlaneGeometry(W,corridorLen);
  const floor=new THREE.Mesh(floorGeo,floorMat);
  floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
  const ceilGeo=new THREE.PlaneGeometry(W,corridorLen);
  const ceil=new THREE.Mesh(ceilGeo,ceilingMat);
  ceil.rotation.x=Math.PI/2;ceil.position.y=H;scene.add(ceil);
  const wallGeo=new THREE.PlaneGeometry(corridorLen,H);
  const lw=new THREE.Mesh(wallGeo,wallMat);
  lw.rotation.y=Math.PI/2;lw.position.set(-W/2,H/2,0);scene.add(lw);
  const rw=new THREE.Mesh(wallGeo,wallMat);
  rw.rotation.y=-Math.PI/2;rw.position.set(W/2,H/2,0);scene.add(rw);
  const railGeo=new THREE.CylinderGeometry(0.05,0.05,corridorLen,8);
  railGeo.rotateX(Math.PI/2);
  for(const xOff of[-1.2,1.2]){
    const rail=new THREE.Mesh(railGeo,railMat);
    rail.position.set(xOff,0.05,0);scene.add(rail);
  }
  const pillarGeo=new THREE.BoxGeometry(0.5,H,0.5);
  for(let z=-40;z<=40;z+=10){
    for(const xOff of[-W/2+0.3,W/2-0.3]){
      const p=new THREE.Mesh(pillarGeo,pillarMat);
      p.position.set(xOff,H/2,z);p.castShadow=true;p.receiveShadow=true;scene.add(p);
    }
  }
  const platGeo=new THREE.BoxGeometry(2.5,0.15,corridorLen);
  for(const xOff of[-W/2+1.25,W/2-1.25]){
    const pl=new THREE.Mesh(platGeo,pillarMat);
    pl.position.set(xOff,0.075,0);scene.add(pl);
  }
  const stripeMat=new THREE.MeshStandardMaterial({color:0xffcc00,roughness:0.5,emissive:0x332200});
  const stripeGeo=new THREE.BoxGeometry(0.15,0.02,2);
  for(let z=-40;z<=40;z+=6){
    for(const xOff of[-W/2+0.08,W/2-0.08]){
      const s=new THREE.Mesh(stripeGeo,stripeMat);
      s.position.set(xOff,0.01,z);scene.add(s);
    }
  }
  const lightGeo=new THREE.BoxGeometry(0.6,0.06,2.5);
  const lightMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffeecc,emissiveIntensity:1.0});
  for(let z=-40;z<=40;z+=12){
    const l=new THREE.Mesh(lightGeo,lightMat);
    l.position.set(0,H-0.03,z);scene.add(l);
    const pl2=new THREE.PointLight(0xffeecc,0.7,14);
    pl2.position.set(0,H-0.3,z);scene.add(pl2);
  }
  const endGeo=new THREE.PlaneGeometry(W,H);
  const endMat=new THREE.MeshStandardMaterial({color:0x111122,roughness:1});
  const endF=new THREE.Mesh(endGeo,endMat);
  endF.position.set(0,H/2,-corridorLen/2);scene.add(endF);
  const endB=new THREE.Mesh(endGeo,endMat);
  endB.rotation.y=Math.PI;endB.position.set(0,H/2,corridorLen/2);scene.add(endB);
  const signMat=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:0.8});
  const signGeo=new THREE.BoxGeometry(2.5,0.4,0.08);
  const sign=new THREE.Mesh(signGeo,signMat);
  sign.position.set(0,H-0.5,-corridorLen/2+0.1);scene.add(sign);
}
buildMetro();

// ============================================================
// WEAPON — 3D rifle attached to camera
// ============================================================
let weaponGroup=null,weaponRecoil=0,weaponBob=0;
function buildWeapon(){
  weaponGroup=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:0.5,metalness:0.8});
  const accentMat=new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:0.3,roughness:0.4,metalness:0.9});
  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.06,0.45),mat);
  body.position.z=-0.15;weaponGroup.add(body);
  // Barrel
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.35,8),mat);
  barrel.rotation.x=Math.PI/2;barrel.position.set(0,0.015,-0.42);weaponGroup.add(barrel);
  // Stock
  const stock=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.1,0.15),mat);
  stock.position.set(0,0,-0.08);weaponGroup.add(stock);
  // Grip
  const grip=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.1,0.06),mat);
  grip.position.set(0,-0.07,-0.02);weaponGroup.add(grip);
  // Magazine
  const mag=new THREE.Mesh(new THREE.BoxGeometry(0.025,0.12,0.05),new THREE.MeshStandardMaterial({color:0x555555,roughness:0.6,metalness:0.7}));
  mag.position.set(0,-0.05,-0.12);weaponGroup.add(mag);
  // Orange accent stripe
  const stripe=new THREE.Mesh(new THREE.BoxGeometry(0.052,0.012,0.2),accentMat);
  stripe.position.set(0,0.032,-0.15);weaponGroup.add(stripe);
  // Rail on top
  const rail=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.015,0.2),new THREE.MeshStandardMaterial({color:0x444444,roughness:0.5,metalness:0.9}));
  rail.position.set(0,0.038,-0.18);weaponGroup.add(rail);
  // Muzzle flash light
  const wmzl=new THREE.PointLight(0xffaa00,0,4);
  wmzl.position.set(0,0,-0.6);weaponGroup.add(wmzl);
  weaponGroup.userData.muzzleLight=wmzl;
  // Position relative to camera
  weaponGroup.position.set(0.28,-0.22,-0.38);
  weaponGroup.rotation.set(0.05,0.1,0);
  camera.add(weaponGroup);
  scene.add(camera);
}
buildWeapon();

const player={yaw:0,pitch:0,speed:5.5,shootCooldown:0,invincible:0};
const raycaster=new THREE.Raycaster();
const shootOrigin=new THREE.Vector2(0,0);
function getShootDelay(){
  const lv=G.lv;
  if(lv>=100)return 0.08;if(lv>=80)return 0.10;if(lv>=60)return 0.12;
  if(lv>=50)return 0.13;if(lv>=40)return 0.14;if(lv>=30)return 0.15;
  if(lv>=25)return 0.16;if(lv>=20)return 0.17;if(lv>=10)return 0.175;return 0.18;
}
function getBulletCount(){
  const lv=G.lv;
  if(lv>=100)return 12;if(lv>=90)return 9;if(lv>=80)return 9;
  if(lv>=70)return 7;if(lv>=60)return 7;if(lv>=50)return 5;
  if(lv>=40)return 5;if(lv>=30)return 3;if(lv>=25)return 3;
  if(lv>=20)return 1;if(lv>=15)return 3;return 1;
}
function getAtk(){
  const lv=G.lv;
  if(lv>=100)return 45;if(lv>=90)return 38;if(lv>=80)return 32;
  if(lv>=70)return 26;if(lv>=60)return 22;if(lv>=50)return 18;
  if(lv>=40)return 15;if(lv>=30)return 12;if(lv>=25)return 10;
  if(lv>=20)return 9;if(lv>=15)return 8;if(lv>=10)return 7;
  if(lv>=5)return 6;return 5;
}
function shoot(){
  if(player.shootCooldown>0)return;
  player.shootCooldown=getShootDelay();
  const atk=getAtk(),count=getBulletCount();
  ensureAudio();playSound('shoot');
  weaponRecoil=0.12;
  if(weaponGroup&&weaponGroup.userData.muzzleLight){
    weaponGroup.userData.muzzleLight.intensity=4;
    setTimeout(()=>{if(weaponGroup)weaponGroup.userData.muzzleLight.intensity=0;},60);
  }
  raycaster.setFromCamera(shootOrigin,camera);
  const hits=raycaster.intersectObjects(enemyMeshes,false);
  if(hits.length>0){
    const e=hits[0].object.userData.enemy;
    if(e&&e.hp>0){
      const dmg=e.isArmored?(atk*0.3):atk;
      damageEnemy(e,dmg,hits[0].point);
    }
  }
  if(count>1){
    for(let i=1;i<count;i++){
      const offset=(i%2===0?1:-1)*Math.ceil(i/2)*0.04;
      const r2=new THREE.Raycaster();
      r2.setFromCamera(new THREE.Vector2(offset,offset*0.5),camera);
      const h2=r2.intersectObjects(enemyMeshes,false);
      if(h2.length>0){
        const e2=h2[0].object.userData.enemy;
        if(e2&&e2.hp>0)damageEnemy(e2,Math.floor((e2.isArmored?atk*0.3:atk)*0.7),h2[0].point);
      }
    }
  }
}

function damageEnemy(e,dmg,point){
  if(e.hp<=0)return;
  if(e.isArmored&&e.armor>0){
    const armDmg=Math.min(e.armor,dmg*2);
    e.armor-=armDmg;
    e.hp-=Math.max(0,dmg-armDmg*0.5);
    e.flash=0.1;
    playSound('armor_hit');
    spawnHitParticles(point||new THREE.Vector3(e.mesh.position),0xaaaaaa);
  }else{
    e.hp-=dmg;
    e.flash=0.1;
    playSound('hit');
    spawnHitParticles(point||new THREE.Vector3(e.mesh.position),0xff4444);
  }
  if(e.hp<=0)killEnemy(e);
}
function killEnemy(e){
  e.hp=0;e.dead=true;
  const bonus=e.isArmored?3:1;
  G.score+=e.pts*bonus;G.xp+=e.pts*bonus;G.kills++;
  playSound('kill');
  spawnHitParticles(e.mesh.position.clone(),e.color);
  if(e.isBoss){
    showMsg('★ '+e.name+' 擊破！','#FFD700',2500);playSound('explode');bossActive=false;
  }else{
    const tag=e.isArmored?'🤖':'👾';
    showKillFeed(tag+' +'+(e.pts*bonus)+' XP');
  }
  scene.remove(e.mesh);
  const idx=enemyMeshes.indexOf(e.mesh);if(idx!==-1)enemyMeshes.splice(idx,1);
  const eIdx=enemies.indexOf(e);if(eIdx!==-1)enemies.splice(eIdx,1);
  checkLevelUp();
}

const particles=[];
function spawnHitParticles(pos,color){
  for(let i=0;i<10;i++){
    const size=0.04+Math.random()*0.08;
    const geo=new THREE.SphereGeometry(size,4,4);
    const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:1});
    const mesh=new THREE.Mesh(geo,mat);mesh.position.copy(pos);scene.add(mesh);
    particles.push({mesh,vel:new THREE.Vector3((Math.random()-0.5)*5,Math.random()*4+1,(Math.random()-0.5)*5),life:0.5+Math.random()*0.3});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);continue;}
    p.mesh.position.addScaledVector(p.vel,dt);p.vel.y-=9.8*dt;
    p.mesh.material.opacity=Math.max(0,p.life)/0.8;
  }
}

const enemies=[];const enemyMeshes=[];let enemySpawnTimer=0;let spawnInterval=2.0;
const BOSS_DATA={
  20:{name:'青龍',color:0x00ff88,hpMult:1.0,ptsMult:1.0},
  40:{name:'赤鳳',color:0xff4400,hpMult:1.8,ptsMult:1.5},
  60:{name:'玄武',color:0x0088ff,hpMult:2.8,ptsMult:2.0},
  80:{name:'白虎',color:0xffffff,hpMult:4.0,ptsMult:2.8},
  100:{name:'深淵首領',color:0xff00ff,hpMult:6.0,ptsMult:4.0}
};

// Armored drone enemy mesh builder
function buildArmoredDroneMesh(){
  const g=new THREE.Group();
  // Body
  const bodyGeo=new THREE.CylinderGeometry(0.5,0.5,0.3,8);
  const bodyMat=new THREE.MeshStandardMaterial({color:0x555566,roughness:0.3,metalness:0.8});
  const body=new THREE.Mesh(bodyGeo,bodyMat);g.add(body);
  // Armor plates (4 sides)
  for(let i=0;i<4;i++){
    const plateGeo=new THREE.BoxGeometry(0.08,0.5,0.3);
    const plateMat=new THREE.MeshStandardMaterial({color:0x888899,roughness:0.2,metalness:0.95,emissive:0x333344,emissiveIntensity:0.2});
    const plate=new THREE.Mesh(plateGeo,plateMat);
    plate.rotation.y=(i*Math.PI/2);
    plate.position.x=Math.sin(i*Math.PI/2)*0.52;
    plate.position.z=Math.cos(i*Math.PI/2)*0.52;
    g.add(plate);
  }
  // Missiles on sides
  for(const side of[-1,1]){
    const podGeo=new THREE.CylinderGeometry(0.06,0.06,0.25,6);
    podGeo.rotateZ(Math.PI/2);
    const podMat=new THREE.MeshStandardMaterial({color:0x444455,metalness:0.8,roughness:0.3});
    const pod=new THREE.Mesh(podGeo,podMat);
    pod.position.set(side*0.5,0.1,0);g.add(pod);
    // Missile tips
    const tipGeo=new THREE.ConeGeometry(0.04,0.1,6);
    const tipMat=new THREE.MeshStandardMaterial({color:0xff3300,emissive:0xff1100,emissiveIntensity:0.5});
    const tip=new THREE.Mesh(tipGeo,tipMat);
    tip.rotation.z=-Math.PI/2;
    tip.position.set(side*0.67,0.1,0);g.add(tip);
  }
  // Central eye
  const eyeGeo=new THREE.SphereGeometry(0.1,8,8);
  const eyeMat=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:1});
  const eye=new THREE.Mesh(eyeGeo,eyeMat);eye.position.y=0.18;g.add(eye);
  const eLight=new THREE.PointLight(0xff3300,1,5);eLight.position.y=0.18;g.add(eLight);
  return g;
}

function spawnEnemy(isBoss,bossLv){
  const lv=bossLv||G.lv;
  const bd=isBoss?(BOSS_DATA[lv]||BOSS_DATA[100]):null;
  const isArmored=(!isBoss&&lv>=15&&Math.random()<0.3+Math.min(lv*0.01,0.3));
  const size=isBoss?1.2+(lv/100)*0.5:(isArmored?0.8+Math.random()*0.2:0.6+Math.random()*0.3);
  let mesh;
  if(isBoss){
    const geo=new THREE.CylinderGeometry(size*0.6,size*0.8,size*2,8);
    const col=bd?.color||0xff0000;
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.4,metalness:0.3,emissive:new THREE.Color(col).multiplyScalar(0.3)});
    mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;
  }else if(isArmored){
    mesh=buildArmoredDroneMesh();
    mesh.scale.setScalar(size/0.8);
    mesh.traverse(c=>{if(c.isMesh){c.castShadow=true;}});
  }else{
    const geo=new THREE.SphereGeometry(size,8,8);
    const col=[0xff3333,0x33ff33,0x3333ff,0xffff33,0xff33ff,0x33ffff][Math.floor(Math.random()*6)];
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.4,metalness:0.3,emissive:new THREE.Color(col).multiplyScalar(0.1)});
    mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;
  }
  const hp=isBoss?Math.floor((15+lv*3)*60*(bd?.hpMult||1)):(isArmored?(40+lv*8):(15+lv*3));
  const speed=isBoss?1.5+lv*0.02:(isArmored?1.2+lv*0.02:2+Math.random()*2+lv*0.04);
  const pts=isBoss?Math.floor((50+lv*20)*(bd?.ptsMult||1)):(isArmored?(15+lv*3):(5+lv*2));
  const atk=isBoss?15+lv*1.5:(isArmored?8+lv*0.8:5+lv*0.5);
  const atkCd=isBoss?1.5-lv*0.005:(isArmored?2.0:1.0+Math.random()*0.5);
  const x=(Math.random()-0.5)*9;
  const z=isBoss?-40:-45-Math.random()*10;
  mesh.position.set(x,isBoss?size:(isArmored?size*0.5+0.3:size*0.5),z);
  const e={
    mesh,hp,maxHp:hp,speed,pts,atk,atkCd,atkTimer:atkCd,
    isBoss:!!isBoss,bossLv:bossLv||0,
    name:isBoss?(bd?.name||'首領'):(isArmored?'裝甲無人機':'敵人'),
    color:isBoss?(bd?.color||0xff0000):(isArmored?0x666688:[0xff3333,0x33ff33,0x3333ff,0xffff33,0xff33ff,0x33ffff][Math.floor(Math.random()*6)]),
    dead:false,flash:0,attackRange:isBoss?2.5:(isArmored?8:1.5),
    isArmored,armor:isArmored?(30+lv*5):0,lastEMissile:0,emissileCd:3+Math.random()*2
  };
  mesh.userData.enemy=e;
  enemies.push(e);enemyMeshes.push(mesh);scene.add(mesh);
  if(isBoss){showMsg('🐉 '+e.name+' 降臨！','#f44',2000);playSound('boss');bossWarnTimer=2.0;}
}

function updateEnemies(dt){
  enemySpawnTimer-=dt;
  if(enemySpawnTimer<=0&&!bossActive){
    enemySpawnTimer=spawnInterval;
    const count=Math.min(1+Math.floor(G.lv/15),4);
    for(let i=0;i<count;i++)spawnEnemy(false);
  }
  const pPos=camera.position;
  for(const e of enemies){
    if(e.dead)continue;
    if(e.flash>0)e.flash-=dt;
    if(e.isArmored){
      e.mesh.traverse(c=>{if(c.isMesh&&c.material&&c.material.emissive){c.material.emissive.setHex(e.flash>0?0xff4400:0x333344);c.material.emissiveIntensity=e.flash>0?1.0:0.2;}});
    }else{
      if(e.mesh.material&&e.mesh.material.emissive){
        e.mesh.material.emissive.setHex(e.flash>0?0xff0000:(e.isBoss?e.color:0));
        e.mesh.material.emissiveIntensity=e.flash>0?1.0:(e.isBoss?0.3:0.1);
      }
    }
    const dx=pPos.x-e.mesh.position.x,dz=pPos.z-e.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>e.attackRange){
      const nx=dx/dist,nz=dz/dist;
      e.mesh.position.x+=nx*e.speed*dt;
      e.mesh.position.z+=nz*e.speed*dt;
      e.mesh.rotation.y=Math.atan2(dx,dz);
    }else{
      e.atkTimer-=dt;
      if(e.atkTimer<=0){
        e.atkTimer=e.atkCd;
        damagePlayer(e.isBoss?e.atk:e.atk*(0.8+Math.random()*0.4));
      }
    }
    // Armored drones shoot missiles at player
    if(e.isArmored){
      e.lastEMissile-=dt;
      if(e.lastEMissile<=0){
        e.lastEMissile=e.emissileCd;
        fireEnemyMissile(e);
      }
    }
    if(!e.isBoss&&!e.isArmored){
      e.mesh.position.y=e.mesh.geometry.parameters.radius+Math.sin(Date.now()*0.003+e.mesh.id)*0.1;
    }else if(!e.isBoss){
      e.mesh.position.y=e.mesh.geometry.parameters.height/2+Math.sin(Date.now()*0.001)*0.2;
    }
  }
}

let bossActive=false,bossWarnTimer=0,bossPendingLv=0;
function checkBossSpawn(){
  const lv=G.lv;
  if(lv%20===0&&lv<=100&&lv>=20&&!bossActive&&!bossPendingLv){bossPendingLv=lv;}
}
function triggerBoss(){

  for(const e of[...enemies]){
    if(!e.isBoss){scene.remove(e.mesh);const idx=enemyMeshes.indexOf(e.mesh);if(idx!==-1)enemyMeshes.splice(idx,1);enemies.splice(enemies.indexOf(e),1);}

function checkLevelUp(){
  const needed=xpForLevel(G.lv);
  while(G.xp>=needed){

  }

}

const drones=[];

function updateDrones(dt){
  const now=performance.now();
  const pPos=camera.position;
  for(const d of drones){
    d.t+=dt;
    const targetX=pPos.x+d.x,targetY=pPos.y+2.0+d.idx*0.3,targetZ=pPos.z+1.5;
    d.mesh.position.x+=(targetX-d.mesh.position.x)*3*dt;
    d.mesh.position.y+=(targetY-d.mesh.position.y)*3*dt;
    d.mesh.position.z+=(targetZ-d.mesh.position.z)*3*dt;
    d.mesh.position.y+=Math.sin(d.t*2.5+d.idx)*0.05;
    d.mesh.rotation.y=player.yaw;
    if(now-d.lastMissile>d.missileDelay){
      d.lastMissile=now;
      fireDroneMissile(d);
    }
  }
}

const missiles=[];
function fireDroneMissile(drone){
  ensureAudio();playSound('shoot_missile');
  let target=null,minD=Infinity;
  for(const e of enemies){if(e.hp<=0)continue;const d=drone.mesh.position.distanceTo(e.mesh.position);if(d<minD){minD=d;target=e;}}
  const tx=target?target.mesh.position.x:camera.position.x+(Math.random()-0.5)*8;
  const ty=target?target.mesh.position.y:camera.position.y-1;
  const tz=target?target.mesh.position.z:-30;
  const geo=new THREE.CylinderGeometry(0.05,0.08,0.35,6);geo.rotateX(Math.PI/2);
  const mat=new THREE.MeshStandardMaterial({color:0xff8800,emissive:0xff4400,emissiveIntensity:0.8,metalness:0.5});
  const mesh=new THREE.Mesh(geo,mat);mesh.position.copy(drone.mesh.position);scene.add(mesh);
  const ml=new THREE.PointLight(0xff6600,1.5,5);ml.position.copy(mesh.position);scene.add(ml);
  missiles.push({mesh,light:ml,tx,ty,tz,target,speed:12,life:4.0});
}
function updateMissiles(dt){
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];m.life-=dt;
    if(m.life<=0){scene.remove(m.mesh);scene.remove(m.light);missiles.splice(i,1);continue;}
    if(m.target&&m.target.hp>0){m.tx=m.target.mesh.position.x;m.ty=m.target.mesh.position.y;m.tz=m.target.mesh.position.z;}
    const dx=m.tx-m.mesh.position.x,dy=m.ty-m.mesh.position.y,dz=m.tz-m.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist>0.5){
      const spd=m.speed*dt;
      m.mesh.position.x+=(dx/dist)*spd;m.mesh.position.y+=(dy/dist)*spd;m.mesh.position.z+=(dz/dist)*spd;
      m.light.position.copy(m.mesh.position);
      m.mesh.lookAt(m.mesh.position.x+dx/dist,m.mesh.position.y+dy/dist,m.mesh.position.z+dz/dist);
    }else{
      scene.remove(m.mesh);scene.remove(m.light);missiles.splice(i,1);
      playSound('explode');
      spawnHitParticles(new THREE.Vector3(m.tx,m.ty,m.tz),0xff8800);
      const radius=2.5;
      for(const e of enemies){if(e.hp<=0)continue;const ed=e.mesh.position.distanceTo(new THREE.Vector3(m.tx,m.ty,m.tz));if(ed<radius){const atkDmg=getAtk()*2.5*(1-ed/radius);if(e.isArmored){e.armor-=atkDmg*0.5;e.hp-=atkDmg*0.5;e.flash=0.15;if(e.armor<0)e.hp+=e.armor,e.armor=0;}else{e.hp-=atkDmg;e.flash=0.15;}if(e.hp<=0)killEnemy(e);}}
    }
  }
}

const keys={};let isPointerLocked=false,manualFire=false;
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'||e.code==='KeyJ'||e.code==='KeyK'){e.preventDefault();manualFire=true;}if(e.code==='Escape'&&isPointerLocked)document.exitPointerLock();});
document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='Space'||e.code==='KeyJ'||e.code==='KeyK')manualFire=false;});
canvas.addEventListener('click',()=>{if(!isPointerLocked){canvas.requestPointerLock();}else{manualFire=true;setTimeout(()=>{manualFire=false;},100);}});
document.addEventListener('pointerlockchange',()=>{isPointerLocked=document.pointerLockElement===canvas;});
document.addEventListener('mousemove',e=>{if(!isPointerLocked)return;const sens=0.002;player.yaw-=e.movementX*sens;player.pitch-=e.movementY*sens;player.pitch=Math.max(-Math.PI*0.4,Math.min(Math.PI*0.4,player.pitch));});
function updatePlayer(dt){
  const moveDir=new THREE.Vector3();
  const forward=new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,player.yaw,0));
  const right=new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0,player.yaw,0));
  if(keys['KeyW']||keys['ArrowUp'])moveDir.add(forward);
  if(keys['KeyS']||keys['ArrowDown'])moveDir.sub(forward);
  if(keys['KeyA']||keys['ArrowLeft'])moveDir.sub(right);
  if(keys['KeyD']||keys['ArrowRight'])moveDir.add(right);
  if(moveDir.lengthSq()>0)moveDir.normalize();
  camera.position.addScaledVector(moveDir,player.speed*dt);
  camera.position.x=Math.max(-6,Math.min(6,camera.position.x));
  camera.position.z=Math.max(-44,Math.min(44,camera.position.z));
  camera.position.y=1.7;
  camera.rotation.set(player.pitch,player.yaw,0,'YXZ');
  if(player.shootCooldown>0)player.shootCooldown-=dt;
  if(manualFire||keys['Space'])shoot();
  // Weapon bob & recoil
  weaponBob+=dt*2.5;
  if(weaponRecoil>0)weaponRecoil-=dt*2;
  else weaponRecoil=0;
  if(weaponGroup){
    const bobX=Math.sin(weaponBob)*0.008;
    const bobY=Math.abs(Math.cos(weaponBob))*0.006;
    weaponGroup.position.set(0.28+bobX,-0.22-bobY+weaponRecoil*0.06,weaponRecoil*0.04);
    weaponGroup.rotation.set(0.05+weaponRecoil*0.3,0.1,weaponRecoil*0.1);
  }
}

let gameRunning=false,lastTime=0;
function startGame(){

  player.yaw=0;player.pitch=0;player.invincible=0;

  for(const m of[...missiles]){scene.remove(m.mesh);scene.remove(m.light);}
  missiles.length=0;
  for(const m of[...enemyMissiles]){scene.remove(m.mesh);scene.remove(m.light);}
  enemyMissiles.length=0;
  for(const p of[...particles])scene.remove(p.mesh);particles.length=0;
  for(const d of[...drones])scene.remove(d.mesh);drones.length=0;
  bossActive=false;bossPendingLv=0;bossWarnTimer=0;
  enemySpawnTimer=1.0;spawnInterval=2.0;gameRunning=true;
  updateHUD();document.getElementById('menu').style.display='none';
  canvas.requestPointerLock();requestAnimationFrame(gameLoop);
}
function gameOver(){
  gameRunning=false;
  showMsg('GAME OVER\n分數: '+G.score.toLocaleString()+'\nLv: '+G.lv,'#f44',5000);
  setTimeout(()=>{document.getElementById('menu').style.display='flex';},2500);
}
function gameLoop(timestamp){
  if(!gameRunning)return;
  const dt=Math.min((timestamp-lastTime)/1000,0.05);lastTime=timestamp;
  updatePlayer(dt);updateEnemies(dt);updateDrones(dt);updateMissiles(dt);updateParticles(dt);updateDamageFlash(dt);updateEnemyMissiles(dt);
  if(bossWarnTimer>0){bossWarnTimer-=dt;if(bossWarnTimer<=0)triggerBoss();}
  if(player.invincible>0){camera.visible=Math.floor(player.invincible*20)%2===0;}else{camera.visible=true;}
  renderer.render(scene,camera);requestAnimationFrame(gameLoop);
}
document.getElementById('startBtn').addEventListener('click',startGame);
const styleEl=document.createElement('style');
styleEl.textContent='@keyframes lvPop{0%{transform:translate(-50%,-50%) scale(0.4);opacity:0}20%{transform:translate(-50%,-50%) scale(1.3);opacity:1}60%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}';
document.head.appendChild(styleEl);
let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;ensureAudio();shoot();}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(e.touches.length===1){const dx=e.touches[0].clientX-touchStartX,dy=e.touches[0].clientY-touchStartY;const sens=0.004;player.yaw-=dx*sens;player.pitch-=dy*sens;player.pitch=Math.max(-Math.PI*0.4,Math.min(Math.PI*0.4,player.pitch));touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;}},{passive:true});
function renderMenu(){if(!gameRunning)renderer.render(scene,camera);requestAnimationFrame(renderMenu);}
renderMenu();
</script>
</body>
