<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎈氣球小丑_FPS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none}
#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hpbar{position:absolute;bottom:28px;left:18px;width:210px;height:18px;background:rgba(0,0,0,0.7);border:2px solid #0f8;border-radius:4px;overflow:hidden}
#hpfill{height:100%;background:linear-gradient(90deg,#0f8,#0ff);width:100%;transition:width .2s}
#hptext{position:absolute;bottom:50px;left:18px;font-size:13px;color:#0f8;text-shadow:0 0 8px #0f8}
#lvdisp{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:22px;font-weight:900;color:#FFD700;text-shadow:0 0 12px #FFD700,0 0 24px #f80}
#scdisp{position:absolute;top:14px;right:18px;font-size:15px;color:#fff;text-shadow:0 0 8px #fff}
#wpn{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:#aaa;letter-spacing:1px}
#xpp{position:absolute;top:48px;left:50%;transform:translateX(-50%);width:220px;height:8px;background:rgba(0,0,0,0.6);border:1px solid #555;border-radius:4px;overflow:hidden}
#xpfill{height:100%;background:linear-gradient(90deg,#f80,#ff0);width:0%;transition:width .3s}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:#FFD700;text-shadow:0 0 20px #FFD700;text-align:center;display:none;pointer-events:none;line-height:1.4}
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;z-index:20;pointer-events:none}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,0.85)}
#xhair::before{top:50%;left:0;width:100%;height:2px;margin-top:-1px}
#xhair::after{left:50%;top:0;height:100%;width:2px;margin-left:-1px}
#xhair .dot{position:absolute;top:50%;left:50%;width:4px;height:4px;background:#f00;border-radius:50%;transform:translate(-50%,-50%)}
#drone-panel{position:absolute;top:14px;left:18px;font-size:12px;color:#0ff;text-shadow:0 0 8px #0ff;line-height:1.7}
.drone-line{opacity:.85}
#dmg-flash{position:fixed;inset:0;background:rgba(255,0,0,.35);pointer-events:none;z-index:30;opacity:0;transition:opacity .08s}
#lv-splash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:56px;font-weight:900;color:#FFD700;text-shadow:0 0 30px #FFD700,0 0 60px #f80;z-index:40;display:none;pointer-events:none;white-space:nowrap}
#killfeed{position:fixed;top:80px;right:16px;font-size:12px;color:#0f8;text-align:right;pointer-events:none;z-index:15}
#buff-indicator{position:absolute;bottom:75px;left:18px;font-size:11px;color:#FFD700;text-shadow:0 0 6px #FFD700;line-height:1.8}
#clown-bar{position:absolute;top:80px;left:50%;transform:translateX(-50%);width:300px;display:none;z-index:15}
#clown-bar-bg{height:12px;background:rgba(0,0,0,0.7);border:2px solid #ff4444;border-radius:6px;overflow:hidden}
#clown-bar-fill{height:100%;background:linear-gradient(90deg,#ff0,#ff4444);width:100%;transition:width .1s}
#clown-bar-label{text-align:center;font-size:11px;color:#ff4444;text-shadow:0 0 8px #f00;margin-top:2px;letter-spacing:1px}
#enemy-hp-bar{position:absolute;display:none;width:60px;height:6px;background:rgba(0,0,0,0.7);border:1px solid #555;border-radius:3px;overflow:hidden}
#enemy-hp-fill{height:100%;background:linear-gradient(90deg,#f44,#f80);width:100%}
#enemy-hp-label{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;color:#f44;white-space:nowrap}
#drop-pickup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:24px 48px;background:rgba(0,0,0,0.92);border:2px solid #FFD700;border-radius:16px;text-align:center;display:none;z-index:60;pointer-events:all}
#drop-pickup h2{color:#FFD700;font-size:20px;margin-bottom:8px;text-shadow:0 0 12px #FFD700}
#drop-pickup .drop-name{color:#fff;font-size:28px;font-weight:900;margin:8px 0}
#drop-pickup .drop-desc{color:#aaa;font-size:13px}
#menu{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50}
#menu h1{font-size:42px;color:#FFD700;text-shadow:0 0 20px #f80;margin-bottom:6px;letter-spacing:2px}
#menu .sub{font-size:13px;color:#888;margin-bottom:28px}
.menu-box{background:rgba(20,20,40,.85);border:2px solid #333;border-radius:16px;padding:24px 32px;text-align:center}
.menu-box h2{font-size:18px;color:#ccc;margin-bottom:14px}
.info-row{font-size:13px;color:#888;margin:4px 0}
.info-span{color:#0f8}
.tip{font-size:12px;color:#555;margin-top:14px;line-height:1.7}
.btn{display:inline-block;padding:12px 36px;font-size:17px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin:6px;transition:all .15s;letter-spacing:1px}
.btn-primary{background:linear-gradient(180deg,#f80,#c60);color:#fff;text-shadow:0 1px 2px #000;box-shadow:0 4px 14px #f8080}
.btn-primary:hover{background:linear-gradient(180deg,#fa0,#e70);transform:translateY(-1px)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="lvdisp">LV <span id="lvnum">1</span></div>
  <div id="scdisp">分數 <span id="scnum">0</span></div>
  <div id="xpp"><div id="xpfill"></div></div>
  <div id="hptext">HP <span id="hpval">100</span> / <span id="hpmax">100</span></div>
  <div id="hpbar"><div id="hpfill"></div></div>
  <div id="wpn">RIFLE</div>
  <div id="buff-indicator"></div>
  <div id="drone-panel"></div>
  <div id="msg"></div>
  <div id="clown-bar"><div id="clown-bar-bg"><div id="clown-bar-fill"></div></div><div id="clown-bar-label">🃏 小丑BOSS</div></div>
  <div id="enemy-hp-bar"><div id="enemy-hp-label"></div><div id="enemy-hp-fill"></div></div>
</div>
<div id="xhair"><div class="dot"></div></div>
<div id="dmg-flash"></div>
<div id="lv-splash"></div>
<div id="killfeed"></div>
<div id="drop-pickup"><h2>擊殺小丑！選擇獎勵</h2><div class="drop-name" id="drop-name"></div><div class="drop-desc" id="drop-desc"></div></div>
<div id="menu">
  <h1>🎈氣球小丑_FPS</h1>
  <div class="sub">Lv1~100 · 每5等小丑BOSS · 每10等導彈無人機</div>
  <div class="menu-box">
    <h2>操作說明</h2>
    <div class="info-row">🎯 <span class="info-span">WASD</span> 移動 · <span class="info-span">Mouse</span> 視角</div>
    <div class="info-row">🔥 <span class="info-span">Left Click / Space</span> 射擊</div>
    <div class="info-row">🛸 <span class="info-span">每10等</span> 解鎖一架導彈無人機</div>
    <div class="info-row">🤖 <span class="info-span">Lv15+</span> 裝甲敵人無人機</div>
    <div class="info-row">🃏 <span class="info-span">每5等</span> 小丑BOSS降臨</div>
    <div class="tip">🔫 雙槍模式：擊殺小丑隨機獲得<br>🃏 小丑掉落：武器/體力/防禦/速度/無人機/雙槍<br>💀 消滅魔王後進入下一個循環</div>
  </div>
  <button class="btn btn-primary" id="startBtn">開始遊戲</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
"use strict";
const G={lv:1,xp:0,score:0,kills:0,hp:100,maxHp:100,def:0,spd:0,dualPistol:false,clownCount:0};
const XP_BASE=120,XP_MUL=1.28;
function xpForLevel(lv){return Math.floor(XP_BASE*Math.pow(XP_MUL,lv-1));}
let audioCtx=null;
function ensureAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
function playSound(type){try{if(!audioCtx)return;const ctx=audioCtx,now=ctx.currentTime;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);if(type==='shoot'){o.type='square';o.frequency.setValueAtTime(220,now);o.frequency.exponentialRampToValueAtTime(80,now+0.06);g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.06);o.start(now);o.stop(now+0.06);}else if(type==='shoot2'){o.type='square';o.frequency.setValueAtTime(260,now);o.frequency.exponentialRampToValueAtTime(100,now+0.05);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.05);o.start(now);o.stop(now+0.05);}else if(type==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(60,now+0.12);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);o.start(now);o.stop(now+0.12);}else if(type==='kill'){o.type='sawtooth';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(1200,now+0.08);o.frequency.exponentialRampToValueAtTime(300,now+0.25);g.gain.setValueAtTime(0.22,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);o.start(now);o.stop(now+0.25);}else if(type==='levelup'){[523,659,784,1047].forEach((f,i)=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.type='triangle';o2.frequency.setValueAtTime(f,now+i*0.12);g2.gain.setValueAtTime(0.2,now+i*0.12);g2.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.22);o2.start(now+i*0.12);o2.stop(now+i*0.12+0.22);});}else if(type==='boss'){o.type='sawtooth';o.frequency.setValueAtTime(80,now);o.frequency.exponentialRampToValueAtTime(200,now+1.5);g.gain.setValueAtTime(0.35,now);g.gain.exponentialRampToValueAtTime(0.001,now+2);o.start(now);o.stop(now+2);}else if(type==='explode'){o.type='sawtooth';o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(20,now+0.4);g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.4);o.start(now);o.stop(now+0.4);}else if(type==='shoot_missile'){o.type='sawtooth';o.frequency.setValueAtTime(800,now);o.frequency.exponentialRampToValueAtTime(400,now+0.08);g.gain.setValueAtTime(0.12,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);o.start(now);o.stop(now+0.08);}else if(type==='armor_hit'){o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(200,now+0.08);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);o.start(now);o.stop(now+0.08);}else if(type==='enemy_missile'){o.type='square';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(600,now+0.15);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);o.start(now);o.stop(now+0.15);}else if(type==='clown_laugh'){for(let i=0;i<3;i++){const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.type='sawtooth';o2.frequency.setValueAtTime(180+i*40,now+i*0.3);o2.frequency.exponentialRampToValueAtTime(120,now+i*0.3+0.15);g2.gain.setValueAtTime(0.2,now+i*0.3);g2.gain.exponentialRampToValueAtTime(0.001,now+i*0.3+0.2);o2.start(now+i*0.3);o2.stop(now+i*0.3+0.2);}}else if(type==='pickup'){o.type='triangle';o.frequency.setValueAtTime(880,now);o.frequency.setValueAtTime(1100,now+0.1);o.frequency.setValueAtTime(1320,now+0.2);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);o.start(now);o.stop(now+0.35);}}catch(e){}}

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a12);
scene.fog=new THREE.FogExp2(0x0a0a12,0.025);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,200);
camera.position.set(0,1.7,0);
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
resize();window.addEventListener('resize',resize);
scene.add(new THREE.AmbientLight(0x334466,0.6));
const sunLight=new THREE.DirectionalLight(0x8899bb,0.8);sunLight.position.set(10,20,10);sunLight.castShadow=true;sunLight.shadow.mapSize.set(1024,1024);scene.add(sunLight);
const fillLight=new THREE.PointLight(0x223366,0.5,30);fillLight.position.set(-5,5,-5);scene.add(fillLight);
function buildMetro(){
  const W=14,H=6,corridorLen=90;
  const floorGeo=new THREE.PlaneGeometry(W,corridorLen);
  const floor=new THREE.Mesh(floorGeo,new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.9,metalness:0.1}));
  floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(W,corridorLen),new THREE.MeshStandardMaterial({color:0x111122,roughness:0.95}));
  ceil.rotation.x=Math.PI/2;ceil.position.y=H;scene.add(ceil);
  const wallMat=new THREE.MeshStandardMaterial({color:0x22223a,roughness:0.7,metalness:0.2});
  const lw=new THREE.Mesh(new THREE.PlaneGeometry(corridorLen,H),wallMat);lw.rotation.y=Math.PI/2;lw.position.set(-W/2,H/2,0);scene.add(lw);
  const rw=new THREE.Mesh(new THREE.PlaneGeometry(corridorLen,H),wallMat);rw.rotation.y=-Math.PI/2;rw.position.set(W/2,H/2,0);scene.add(rw);
  const pillarMat=new THREE.MeshStandardMaterial({color:0x2a2a4a,roughness:0.6,metalness:0.3});
  for(let z=-40;z<=40;z+=10){for(const xO of[-W/2+0.3,W/2-0.3]){const p=new THREE.Mesh(new THREE.BoxGeometry(0.5,H,0.5),pillarMat);p.position.set(xO,H/2,z);p.castShadow=true;p.receiveShadow=true;scene.add(p);}}
  for(const xO of[-W/2+1.25,W/2-1.25]){const pl=new THREE.Mesh(new THREE.BoxGeometry(2.5,0.15,corridorLen),pillarMat);pl.position.set(xO,0.075,0);scene.add(pl);}
  const stripeMat=new THREE.MeshStandardMaterial({color:0xffcc00,roughness:0.5,emissive:0x332200});
  for(let z=-40;z<=40;z+=6)for(const xO of[-W/2+0.08,W/2-0.08]){const s=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.02,2),stripeMat);s.position.set(xO,0.01,z);scene.add(s);}
  for(let z=-40;z<=40;z+=12){
    const l=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.06,2.5),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffeecc,emissiveIntensity:1.0}));
    l.position.set(0,H-0.03,z);scene.add(l);
    const pl2=new THREE.PointLight(0xffeecc,0.7,14);pl2.position.set(0,H-0.3,z);scene.add(pl2);
  }
  const endMat=new THREE.MeshStandardMaterial({color:0x111122,roughness:1});
  const endF=new THREE.Mesh(new THREE.PlaneGeometry(W,H),endMat);endF.position.set(0,H/2,-corridorLen/2);scene.add(endF);
  const endB=new THREE.Mesh(new THREE.PlaneGeometry(W,H),endMat);endB.rotation.y=Math.PI;endB.position.set(0,H/2,corridorLen/2);scene.add(endB);
}
buildMetro();

// ============================================================
// WEAPONS — rifle + dual pistols attached to camera
// ============================================================
let weaponGroup=null,weaponGroup2=null,weaponRecoil=0,weaponBob=0;
function buildWeaponRifle(){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:0.5,metalness:0.8});
  const accentMat=new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:0.3,roughness:0.4,metalness:0.9});
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.06,0.45),mat);body.position.z=-0.15;g.add(body);
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.35,8),mat);barrel.rotation.x=Math.PI/2;barrel.position.set(0,0.015,-0.42);g.add(barrel);
  const stock=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.1,0.15),mat);stock.position.set(0,0,-0.08);g.add(stock);
  const grip=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.1,0.06),mat);grip.position.set(0,-0.07,-0.02);g.add(grip);
  const mag=new THREE.Mesh(new THREE.BoxGeometry(0.025,0.12,0.05),new THREE.MeshStandardMaterial({color:0x555555,roughness:0.6,metalness:0.7}));mag.position.set(0,-0.05,-0.12);g.add(mag);
  const stripe=new THREE.Mesh(new THREE.BoxGeometry(0.052,0.012,0.2),accentMat);stripe.position.set(0,0.032,-0.15);g.add(stripe);
  const rail=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.015,0.2),new THREE.MeshStandardMaterial({color:0x444444,roughness:0.5,metalness:0.9}));rail.position.set(0,0.038,-0.18);g.add(rail);
  const wmzl=new THREE.PointLight(0xffaa00,0,4);wmzl.position.set(0,0,-0.6);g.add(wmzl);g.userData.muzzleLight=wmzl;
  g.position.set(0.28,-0.22,-0.38);g.rotation.set(0.05,0.1,0);
  return g;
}
function buildPistol(side){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.4,metalness:0.9});
  const accentMat=new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:0.3});
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.04,0.05,0.28),mat),m=>{m.position.z=-0.1;}));
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,0.18,8),mat);barrel.rotation.x=Math.PI/2;barrel.position.set(0,0.01,-0.2);g.add(barrel);
  const grip=new THREE.Mesh(new THREE.BoxGeometry(0.035,0.08,0.05),mat);grip.position.set(0,-0.06,0);grip.rotation.z=side*0.15;g.add(grip);
  const stripe=new THREE.Mesh(new THREE.BoxGeometry(0.042,0.01,0.1),accentMat);stripe.position.set(0,0.026,-0.08);g.add(stripe);
  const wmzl=new THREE.PointLight(0xffaa00,0,3);wmzl.position.set(0,0,-0.3);g.add(wmzl);g.userData.muzzleLight=wmzl;
  g.position.set(side*0.22,-0.2,-0.32);g.rotation.set(0.03,side*0.08,0);
  return g;
}
function buildWeapons(){
  if(weaponGroup){camera.remove(weaponGroup);scene.remove(weaponGroup);}
  if(weaponGroup2){camera.remove(weaponGroup2);scene.remove(weaponGroup2);weaponGroup2=null;}
  if(G.dualPistol){
    weaponGroup=buildPistol(-1);
    weaponGroup2=buildPistol(1);
    camera.add(weaponGroup);camera.add(weaponGroup2);
    scene.add(camera);
  }else{
    weaponGroup=buildWeaponRifle();
    camera.add(weaponGroup);scene.add(camera);
  }
}
buildWeapons();

const player={yaw:0,pitch:0,speed:5.5,shootCooldown:0,invincible:0};
const raycaster=new THREE.Raycaster();
const shootOrigin=new THREE.Vector2(0,0);
function getShootDelay(){
  const lv=G.lv;
  if(lv>=100)return 0.08;if(lv>=80)return 0.10;if(lv>=60)return 0.12;
  if(lv>=50)return 0.13;if(lv>=40)return 0.14;if(lv>=30)return 0.15;
  if(lv>=25)return 0.16;if(lv>=20)return 0.17;if(lv>=10)return 0.175;return 0.18;
}
function getBulletCount(){
  const lv=G.lv;
  if(lv>=100)return 12;if(lv>=90)return 9;if(lv>=80)return 9;
  if(lv>=70)return 7;if(lv>=60)return 7;if(lv>=50)return 5;
  if(lv>=40)return 5;if(lv>=30)return 3;if(lv>=25)return 3;
  if(lv>=20)return 1;if(lv>=15)return 3;return 1;
}
function getAtk(){
  const lv=G.lv;
  if(lv>=100)return 45;if(lv>=90)return 38;if(lv>=80)return 32;
  if(lv>=70)return 26;if(lv>=60)return 22;if(lv>=50)return 18;
  if(lv>=40)return 15;if(lv>=30)return 12;if(lv>=25)return 10;
  if(lv>=20)return 9;if(lv>=15)return 8;if(lv>=10)return 7;
  if(lv>=5)return 6;return 5;
}
function doMuzzleFlash(wg){
  if(wg&&wg.userData.muzzleLight){wg.userData.muzzleLight.intensity=4;setTimeout(()=>{if(wg)wg.userData.muzzleLight.intensity=0;},60);}
}
function shoot(){
  if(player.shootCooldown>0)return;
  player.shootCooldown=getShootDelay();
  const atk=getAtk(),count=getBulletCount();
  ensureAudio();
  playSound(G.dualPistol?'shoot2':'shoot');
  weaponRecoil=0.12;
  if(G.dualPistol){
    doMuzzleFlash(weaponGroup);doMuzzleFlash(weaponGroup2);
  }else{doMuzzleFlash(weaponGroup);}
  raycaster.setFromCamera(shootOrigin,camera);
  const hits=raycaster.intersectObjects(enemyMeshes,false);
  if(hits.length>0){
    const e=hits[0].object.userData.enemy;
    if(e&&e.hp>0){const dmg=e.isClown?(atk*0.5):(e.isArmored?(atk*0.3):atk);damageEnemy(e,dmg,hits[0].point);}}
  if(count>1){
    for(let i=1;i<count;i++){
      const offset=(i%2===0?1:-1)*Math.ceil(i/2)*0.04;
      const r2=new THREE.Raycaster();r2.setFromCamera(new THREE.Vector2(offset,offset*0.5),camera);
      const h2=r2.intersectObjects(enemyMeshes,false);
      if(h2.length>0){
        const e2=h2[0].object.userData.enemy;
        if(e2&&e2.hp>0){const dmg2=e2.isClown?(atk*0.4):(e2.isArmored?(atk*0.2):Math.floor(atk*0.7));damageEnemy(e2,dmg2,h2[0].point);}
      }
    }
  }
}

function damageEnemy(e,dmg,point){
  if(e.hp<=0)return;
  if(e.isArmored&&e.armor>0){
    const armDmg=Math.min(e.armor,dmg*2);e.armor-=armDmg;e.hp-=Math.max(0,dmg-armDmg*0.5);
    e.flash=0.1;playSound('armor_hit');spawnHitParticles(point||new THREE.Vector3(e.mesh.position),0xaaaaaa);
  }else if(e.isClown){
    e.hp-=dmg;e.flash=0.05;playSound('hit');spawnHitParticles(point||new THREE.Vector3(e.mesh.position),0xff4444);
    document.getElementById('clown-bar-fill').style.width=(e.hp/e.maxHp*100)+'%';
  }else{
    e.hp-=dmg;e.flash=0.1;playSound('hit');spawnHitParticles(point||new THREE.Vector3(e.mesh.position),0xff4444);
  }
  if(e.hp<=0)killEnemy(e);
}
function killEnemy(e){
  e.hp=0;e.dead=true;
  const bonus=e.isArmored?3:1;
  G.score+=e.pts*bonus;G.xp+=e.pts*bonus;G.kills++;
  playSound('kill');spawnHitParticles(e.mesh.position.clone(),e.color);
  if(e.isClown){
    showMsg('🃏 小丑擊破！','#FFD700',1500);playSound('clown_laugh');playSound('explode');
    setTimeout(()=>showDropMenu(),800);
  }else if(e.isBoss){
    showMsg('★ '+e.name+' 擊破！','#FFD700',2500);playSound('explode');bossActive=false;
  }else{const tag=e.isArmored?'🤖':'👾';showKillFeed(tag+' +'+(e.pts*bonus)+' XP');}
  scene.remove(e.mesh);
  const idx=enemyMeshes.indexOf(e.mesh);if(idx!==-1)enemyMeshes.splice(idx,1);
  const eIdx=enemies.indexOf(e);if(eIdx!==-1)enemies.splice(eIdx,1);
  checkLevelUp();
}

const particles=[];
function spawnHitParticles(pos,color){
  for(let i=0;i<10;i++){
    const size=0.04+Math.random()*0.08;
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,4,4),new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
    mesh.position.copy(pos);scene.add(mesh);
    particles.push({mesh,vel:new THREE.Vector3((Math.random()-0.5)*5,Math.random()*4+1,(Math.random()-0.5)*5),life:0.5+Math.random()*0.3});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);continue;}
    p.mesh.position.addScaledVector(p.vel,dt);p.vel.y-=9.8*dt;p.mesh.material.opacity=Math.max(0,p.life)/0.8;
  }
}

    shoulder.position.set(side*0.38,0.28,0);g.add(shoulder);
    // Sleeve ruffle
    for(let j=0;j<4;j++){
      const ruf=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.1,0.04),ruffMat);
      const a=side*(Math.PI/2+j*0.3);
      ruf.position.set(side*0.45+Math.sin(a)*0.1,0.15-j*0.08,Math.cos(a)*0.1);g.add(ruf);

function spawnEnemy(isBoss,bossLv){
  const lv=bossLv||G.lv;
  const bd=isBoss?(BOSS_DATA[lv]||BOSS_DATA[100]):null;
  const isArmored=(!isBoss&&lv>=15&&Math.random()<0.3+Math.min(lv*0.01,0.3));
  const size=isBoss?1.2+(lv/100)*0.5:(isArmored?0.8+Math.random()*0.2:0.6+Math.random()*0.3);
  let mesh;
  if(isBoss){
    const geo=new THREE.CylinderGeometry(size*0.6,size*0.8,size*2,8);
    const col=bd?.color||0xff0000;
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.4,metalness:0.3,emissive:new THREE.Color(col).multiplyScalar(0.3)});
    mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;
  }else if(isArmored){
    mesh=buildArmoredDroneMesh();mesh.scale.setScalar(size/0.8);mesh.traverse(c=>{if(c.isMesh)c.castShadow=true;});
  }else{
    const geo=new THREE.SphereGeometry(size,8,8);
    const col=[0xff3333,0x33ff33,0x3333ff,0xffff33,0xff33ff,0x33ffff][Math.floor(Math.random()*6)];
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.4,metalness:0.3,emissive:new THREE.Color(col).multiplyScalar(0.1)});
    mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;
  }
  const hp=isBoss?Math.floor((15+lv*3)*60*(bd?.hpMult||1)):(isArmored?(40+lv*8):(15+lv*3));
  const speed=isBoss?1.5+lv*0.02:(isArmored?1.2+lv*0.02:2+Math.random()*2+lv*0.04);
  const pts=isBoss?Math.floor((50+lv*20)*(bd?.ptsMult||1)):(isArmored?(15+lv*3):(5+lv*2));
  const atk=isBoss?15+lv*1.5:(isArmored?8+lv*0.8:5+lv*0.5);
  const atkCd=isBoss?1.5-lv*0.005:(isArmored?2.0:1.0+Math.random()*0.5);
  const x=(Math.random()-0.5)*9;
  const z=isBoss?-40:-45-Math.random()*10;
  mesh.position.set(x,isBoss?size:(isArmored?size*0.5+0.3:size*0.5),z);
  const e={mesh,hp,maxHp:hp,speed,pts,atk,atkCd,atkTimer:atkCd,isBoss:!!isBoss,bossLv:bossLv||0,name:isBoss?(bd?.name||'首領'):(isArmored?'裝甲無人機':'敵人'),color:isBoss?(bd?.color||0xff0000):(isArmored?0x666688:[0xff3333,0x33ff33,0x3333ff,0xffff33,0xff33ff,0x33ffff][Math.floor(Math.random()*6)]),dead:false,flash:0,attackRange:isBoss?2.5:(isArmored?8:1.5),isArmored,armor:isArmored?(30+lv*5):0,lastEMissile:0,emissileCd:3+Math.random()*2,isClown:false};
  mesh.userData.enemy=e;enemies.push(e);enemyMeshes.push(mesh);scene.add(mesh);
  if(isBoss){showMsg('🐉 '+e.name+' 降臨！','#f44',2000);playSound('boss');bossWarnTimer=2.0;}
}

// Spawn clown boss every 5 levels
function checkClownSpawn(){
  const lv=G.lv;
  if(lv%5===0&&lv>=5&&!bossActive){
    const clownNum=G.clownCount;
    G.clownCount++;
    spawnClown(lv,clownNum);
  }
}
function spawnClown(lv,num){
  bossActive=true;
  for(const e of[...enemies]){if(!e.isBoss){scene.remove(e.mesh);const idx=enemyMeshes.indexOf(e.mesh);if(idx!==-1)enemyMeshes.splice(idx,1);enemies.splice(enemies.indexOf(e),1);}}
  const mesh=buildPennywise();
  mesh.scale.setScalar(0.9);
  const hp=Math.floor(80+lv*15+num*50);
  const speed=1.0+lv*0.015;
  const atk=12+lv*0.8;
  const pts=80+lv*15;

  const e={mesh,hp,maxHp:hp,speed,pts,atk,atkCd:1.8,atkTimer:1.8,isBoss:false,bossLv:lv,name:'小丑BOSS #'+num,color:0xff0000,dead:false,flash:0,attackRange:2.0,isArmored:false,armor:0,isClown:true,lastEMissile:0,emissileCd:2+Math.random(),hasLaughed:false,phase:0};
  mesh.userData.enemy=e;enemies.push(e);enemyMeshes.push(mesh);scene.add(mesh);
  document.getElementById('clown-bar').style.display='block';

}

function updateEnemies(dt){
  enemySpawnTimer-=dt;
  if(enemySpawnTimer<=0&&!bossActive){
    enemySpawnTimer=spawnInterval;
    const count=Math.min(1+Math.floor(G.lv/15),4);
    for(let i=0;i<count;i++)spawnEnemy(false);
  }
  const pPos=camera.position;
  for(const e of enemies){
    if(e.dead)continue;
    if(e.flash>0)e.flash-=dt;
    if(e.isClown){
      e.mesh.traverse(c=>{
        if(c.isMesh&&c.material&&c.material.emissive&&!c.material.emissiveIntensity){c.material.emissive.setHex(e.flash>0?0xff0000:0x440000);}
      });
      // Laughing phase
      if(!e.hasLaughed&&e.hp<e.maxHp*0.7){e.hasLaughed=true;playSound('clown_laugh');}
      if(e.hp<e.maxHp*0.4&&e.phase===0){e.phase=1;e.speed*=1.5;playSound('clown_laugh');}
    }else if(e.isArmored){
      e.mesh.traverse(c=>{if(c.isMesh&&c.material&&c.material.emissive)c.material.emissive.setHex(e.flash>0?0xff4400:0x333344);});
    }else if(e.mesh.material&&e.mesh.material.emissive){
      e.mesh.material.emissive.setHex(e.flash>0?0xff0000:(e.isBoss?e.color:0));
      e.mesh.material.emissiveIntensity=e.flash>0?1.0:(e.isBoss?0.3:0.1);
    }
    const dx=pPos.x-e.mesh.position.x,dz=pPos.z-e.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>e.attackRange){
      const nx=dx/dist,nz=dz/dist;
      e.mesh.position.x+=nx*e.speed*dt;
      e.mesh.position.z+=nz*e.speed*dt;
      e.mesh.rotation.y=Math.atan2(dx,dz);
    }else{
      e.atkTimer-=dt;
      if(e.atkTimer<=0){e.atkTimer=e.atkCd;damagePlayer(e.isBoss?e.atk:e.atk*(0.8+Math.random()*0.4));}
    }
    if(e.isArmored){
      e.lastEMissile-=dt;
      if(e.lastEMissile<=0){e.lastEMissile=e.emissileCd;fireEnemyMissile(e);}
    }
    if(e.isClown){
      e.mesh.position.y=0.45+Math.sin(Date.now()*0.003)*0.08;
    }else if(!e.isBoss){
      e.mesh.position.y=e.mesh.geometry.parameters.radius+Math.sin(Date.now()*0.003+e.mesh.id)*0.1;
    }else{
      e.mesh.position.y=e.mesh.geometry.parameters.height/2+Math.sin(Date.now()*0.001)*0.2;
    }
  }
}

const enemyMissiles=[];
function fireEnemyMissile(e){
  ensureAudio();playSound('enemy_missile');
  const geo=new THREE.CylinderGeometry(0.04,0.06,0.3,6);geo.rotateX(Math.PI/2);
  const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:0.8,metalness:0.5}));
  mesh.position.copy(e.mesh.position);scene.add(mesh);
  const ml=new THREE.PointLight(0xff0000,1.5,5);ml.position.copy(mesh.position);scene.add(ml);
  enemyMissiles.push({mesh,light:ml,tx:camera.position.x,ty:camera.position.y,tz:camera.position.z,speed:10,life:5.0});
}
function updateEnemyMissiles(dt){
  for(let i=enemyMissiles.length-1;i>=0;i--){
    const m=enemyMissiles[i];m.life-=dt;
    if(m.life<=0){scene.remove(m.mesh);scene.remove(m.light);enemyMissiles.splice(i,1);continue;}
    const dx=m.tx-m.mesh.position.x,dy=m.ty-m.mesh.position.y,dz=m.tz-m.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist>0.5){
      const spd=m.speed*dt;
      m.mesh.position.x+=(dx/dist)*spd;m.mesh.position.y+=(dy/dist)*spd;m.mesh.position.z+=(dz/dist)*spd;
      m.light.position.copy(m.mesh.position);
      m.mesh.lookAt(m.mesh.position.x+dx/dist,m.mesh.position.y+dy/dist,m.mesh.position.z+dz/dist);
    }else{
      scene.remove(m.mesh);scene.remove(m.light);enemyMissiles.splice(i,1);
      playSound('explode');spawnHitParticles(new THREE.Vector3(m.tx,m.ty,m.tz),0xff4400);
      const p=camera.position,d=Math.sqrt((p.x-m.tx)**2+(p.y-m.ty)**2+(p.z-m.tz)**2);
      if(d<3){const dmg=(5+G.lv*0.5)*(1-G.def*0.01);damagePlayer(dmg);}
    }
  }
}

let bossActive=false,bossWarnTimer=0;
function triggerBoss(){
  bossActive=true;bossWarnTimer=0;
  for(const e of[...enemies]){if(!e.isBoss){scene.remove(e.mesh);const idx=enemyMeshes.indexOf(e.mesh);if(idx!==-1)enemyMeshes.splice(idx,1);enemies.splice(enemies.indexOf(e),1);}}
  spawnEnemy(true,G.lv);
}
function checkLevelUp(){
  const needed=xpForLevel(G.lv);
  while(G.xp>=needed){
    G.xp-=needed;G.lv++;playSound('levelup');showLevelSplash(G.lv);
    const droneCount=Math.floor(G.lv/10);
    while(drones.length<droneCount)spawnDrone(drones.length);
    G.maxHp=100+(G.lv-1)*5;G.hp=Math.min(G.hp+20,G.maxHp);
    checkClownSpawn();
  }
  updateHUD();
}

const drones=[];
function spawnDrone(idx){
  const offsetX=(idx%2===0?-1:1)*(1.5+idx*0.8);
  const d={idx,x:offsetX,y:0,t:idx*0.4,lastMissile:0,missileDelay:600-idx*40};
  drones.push(d);
  const droneGroup=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0x445566,metalness:0.7,roughness:0.3});
  const body=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.08,0.6),bodyMat);droneGroup.add(body);
  for(const side of[-1,1]){
    const w=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.02,0.15),new THREE.MeshStandardMaterial({color:0x667788,metalness:0.6}));w.position.set(side*0.38,0,0);droneGroup.add(w);
  }
  const lMat=new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:1});
  const light=new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6),lMat);light.position.y=0.06;droneGroup.add(light);
  const pl=new THREE.PointLight(0x00ffff,0.5,4);droneGroup.add(pl);
  d.mesh=droneGroup;d.light=pl;scene.add(droneGroup);showDronePanel();
}
function updateDrones(dt){
  const now=performance.now();const pPos=camera.position;
  for(const d of drones){
    d.t+=dt;
    const targetX=pPos.x+d.x,targetY=pPos.y+2.0+d.idx*0.3,targetZ=pPos.z+1.5;
    d.mesh.position.x+=(targetX-d.mesh.position.x)*3*dt;
    d.mesh.position.y+=(targetY-d.mesh.position.y)*3*dt;
    d.mesh.position.z+=(targetZ-d.mesh.position.z)*3*dt;
    d.mesh.position.y+=Math.sin(d.t*2.5+d.idx)*0.05;
    d.mesh.rotation.y=player.yaw;
    if(now-d.lastMissile>d.missileDelay){d.lastMissile=now;fireDroneMissile(d);}
  }
}

const missiles=[];
function fireDroneMissile(drone){
  ensureAudio();playSound('shoot_missile');
  let target=null,minD=Infinity;
  for(const e of enemies){if(e.hp<=0)continue;const d=drone.mesh.position.distanceTo(e.mesh.position);if(d<minD){minD=d;target=e;}}
  const tx=target?target.mesh.position.x:camera.position.x+(Math.random()-0.5)*8;
  const ty=target?target.mesh.position.y:camera.position.y-1;
  const tz=target?target.mesh.position.z:-30;
  const mesh=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.08,0.35,6),new THREE.MeshStandardMaterial({color:0xff8800,emissive:0xff4400,emissiveIntensity:0.8,metalness:0.5}));
  mesh.position.copy(drone.mesh.position);scene.add(mesh);
  const ml=new THREE.PointLight(0xff6600,1.5,5);ml.position.copy(mesh.position);scene.add(ml);
  missiles.push({mesh,light:ml,tx,ty,tz,target,speed:12,life:4.0});
}
function updateMissiles(dt){
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];m.life-=dt;
    if(m.life<=0){scene.remove(m.mesh);scene.remove(m.light);missiles.splice(i,1);continue;}
    if(m.target&&m.target.hp>0){m.tx=m.target.mesh.position.x;m.ty=m.target.mesh.position.y;m.tz=m.target.mesh.position.z;}
    const dx=m.tx-m.mesh.position.x,dy=m.ty-m.mesh.position.y,dz=m.tz-m.mesh.position.z;
    const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist>0.5){
      const spd=m.speed*dt;
      m.mesh.position.x+=(dx/dist)*spd;m.mesh.position.y+=(dy/dist)*spd;m.mesh.position.z+=(dz/dist)*spd;
      m.light.position.copy(m.mesh.position);
      m.mesh.lookAt(m.mesh.position.x+dx/dist,m.mesh.position.y+dy/dist,m.mesh.position.z+dz/dist);
    }else{
      scene.remove(m.mesh);scene.remove(m.light);missiles.splice(i,1);
      playSound('explode');spawnHitParticles(new THREE.Vector3(m.tx,m.ty,m.tz),0xff8800);
      const radius=2.5;
      for(const e of enemies){if(e.hp<=0)continue;const ed=e.mesh.position.distanceTo(new THREE.Vector3(m.tx,m.ty,m.tz));if(ed<radius){
        const atkDmg=getAtk()*2.5*(1-ed/radius);
        if(e.isArmored){e.armor-=atkDmg*0.5;e.hp-=atkDmg*0.5;e.flash=0.15;if(e.armor<0){e.hp+=e.armor;e.armor=0;}}
        else{e.hp-=atkDmg;e.flash=0.15;}
        if(e.hp<=0)killEnemy(e);
      }}
    }
  }
}

// ============================================================
// DROP SYSTEM
// ============================================================
const DROPS=[
  {name:'⚔️ 武器強化',desc:'子彈傷害 +30%',apply:()=>{}},
  {name:'❤️ 體力提升',desc:'最大HP +30',apply:()=>{G.maxHp+=30;G.hp=Math.min(G.hp+30,G.maxHp);}},
  {name:'🛡️ 防禦強化',desc:'受到傷害 -15%',apply:()=>{G.def+=15;}},
  {name:'⚡ 速度提升',desc:'移動速度 +20%',apply:()=>{player.speed*=1.2;}},
  {name:'🛸 無人機強化',desc:'立即獲得一架導彈無人機',apply:()=>{if(drones.length<10)spawnDrone(drones.length);}},
  {name:'🔫 雙槍模式',desc:'解鎖雙手武器！',apply:()=>{G.dualPistol=true;buildWeapons();}},
];
let dropPending=false;
function showDropMenu(){
  const drop=DROPS[Math.floor(Math.random()*DROPS.length)];
  const menu=document.getElementById('drop-pickup');
  document.getElementById('drop-name').textContent=drop.name;
  document.getElementById('drop-desc').textContent=drop.desc;
  menu.style.display='block';dropPending=true;
  playSound('pickup');
  const acceptBtn=document.createElement('button');
  acceptBtn.className='btn btn-primary';
  acceptBtn.style.cssText='margin-top:16px;pointer-events:all';
  acceptBtn.textContent='領取！';
  acceptBtn.onclick=()=>{
    drop.apply();updateBuffIndicator();updateHUD();menu.style.display='none';dropPending=false;bossActive=false;
    document.getElementById('clown-bar').style.display='none';
    setTimeout(()=>{if(!gameRunning)return;checkClownSpawn();},500);
  };
  menu.appendChild(acceptBtn);
}

function updateBuffIndicator(){
  const el=document.getElementById('buff-indicator');
  const parts=[];
  if(G.dualPistol)parts.push('🔫雙槍');
  if(G.def>0)parts.push('🛡️防禦+'+G.def);
  if(player.speed>5.5)parts.push('⚡速度+'+(Math.round((player.speed/5.5-1)*100))+'%');
  if(drones.length>0)parts.push('🛸×'+drones.length);
  el.textContent=parts.join('  ');
}

let dmgFlashTimer=0;const dmgFlashEl=document.getElementById('dmg-flash');
function damagePlayer(dmg){if(player.invincible>0)return;const finalDmg=dmg*(1-G.def*0.01);G.hp-=finalDmg;if(G.hp<0)G.hp=0;player.invincible=0.5;dmgFlashTimer=0.15;playSound('hit');if(G.hp<=0)gameOver();updateHUD();}
function updateDamageFlash(dt){if(dmgFlashTimer>0){dmgFlashTimer-=dt;dmgFlashEl.style.opacity=dmgFlashTimer/0.15;}else{dmgFlashEl.style.opacity=0;}if(player.invincible>0)player.invincible-=dt;}

const keys={};let isPointerLocked=false,manualFire=false;
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'||e.code==='KeyJ'||e.code==='KeyK'){e.preventDefault();manualFire=true;}if(e.code==='Escape'&&isPointerLocked)document.exitPointerLock();});
document.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='Space'||e.code==='KeyJ'||e.code==='KeyK')manualFire=false;});
canvas.addEventListener('click',()=>{if(!isPointerLocked){canvas.requestPointerLock();}else{manualFire=true;setTimeout(()=>{manualFire=false;},100);}});
document.addEventListener('pointerlockchange',()=>{isPointerLocked=document.pointerLockElement===canvas;});
document.addEventListener('mousemove',e=>{if(!isPointerLocked)return;const sens=0.002;player.yaw-=e.movementX*sens;player.pitch-=e.movementY*sens;player.pitch=Math.max(-Math.PI*0.4,Math.min(Math.PI*0.4,player.pitch));});
function updatePlayer(dt){
  const moveDir=new THREE.Vector3();
  const forward=new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,player.yaw,0));
  const right=new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0,player.yaw,0));
  if(keys['KeyW']||keys['ArrowUp'])moveDir.add(forward);
  if(keys['KeyS']||keys['ArrowDown'])moveDir.sub(forward);
  if(keys['KeyA']||keys['ArrowLeft'])moveDir.sub(right);
  if(keys['KeyD']||keys['ArrowRight'])moveDir.add(right);
  if(moveDir.lengthSq()>0)moveDir.normalize();
  camera.position.addScaledVector(moveDir,player.speed*dt);
  camera.position.x=Math.max(-6,Math.min(6,camera.position.x));
  camera.position.z=Math.max(-44,Math.min(44,camera.position.z));
  camera.position.y=1.7;
  camera.rotation.set(player.pitch,player.yaw,0,'YXZ');
  if(player.shootCooldown>0)player.shootCooldown-=dt;
  if(manualFire||keys['Space'])shoot();
  weaponBob+=dt*2.5;
  if(weaponRecoil>0)weaponRecoil-=dt*2;else weaponRecoil=0;
  if(weaponGroup){
    const bobX=Math.sin(weaponBob)*0.008,bobY=Math.abs(Math.cos(weaponBob))*0.006;
    weaponGroup.position.set(G.dualPistol?(-0.22+bobX):(0.28+bobX),-0.22-bobY+weaponRecoil*0.06,weaponRecoil*0.04);
    weaponGroup.rotation.set(0.05+weaponRecoil*0.3,G.dualPistol?-0.08:0.1,weaponRecoil*0.1);
  }
  if(weaponGroup2){
    const bobX=Math.sin(weaponBob+Math.PI)*0.008,bobY=Math.abs(Math.cos(weaponBob+Math.PI))*0.006;
    weaponGroup2.position.set(0.22+bobX,-0.2-bobY+weaponRecoil*0.06,weaponRecoil*0.04);
    weaponGroup2.rotation.set(0.03+weaponRecoil*0.3,0.08,weaponRecoil*0.1);
  }
}
function updateHUD(){
  document.getElementById('lvnum').textContent=G.lv;
  document.getElementById('scnum').textContent=G.score.toLocaleString();
  document.getElementById('hpval').textContent=Math.ceil(G.hp);
  document.getElementById('hpmax').textContent=G.maxHp;
  document.getElementById('hpfill').style.width=Math.max(0,G.hp/G.maxHp*100)+'%';
  const needed=xpForLevel(G.lv),xpPct=Math.min(100,G.xp/needed*100);
  document.getElementById('xpfill').style.width=xpPct+'%';
  const bc=getBulletCount();
  document.getElementById('wpn').textContent=G.dualPistol?'DUAL PISTOLS x2':(bc>1?'RIFLE x'+bc:'RIFLE');
  const ehBar=document.getElementById('enemy-hp-bar');
  raycaster.setFromCamera(shootOrigin,camera);
  const hits=raycaster.intersectObjects(enemyMeshes,false);
  if(hits.length>0){
    const e=hits[0].object.userData.enemy;
    if(e&&e.hp>0){
      const screenPos=hits[0].point.clone().project(camera);
      ehBar.style.display='block';ehBar.style.left=((screenPos.x+1)/2*innerWidth-30)+'px';ehBar.style.top=((-screenPos.y+1)/2*innerHeight-20)+'px';
      document.getElementById('enemy-hp-fill').style.width=Math.max(0,e.hp/e.maxHp*100)+'%';
      document.getElementById('enemy-hp-label').textContent=e.name+(e.isArmored&&e.armor>0?' 🛡'+Math.ceil(e.armor):'')+' '+Math.ceil(e.hp)+'/'+e.maxHp;
    }else{ehBar.style.display='none';}
  }else{ehBar.style.display='none';}
}
function showDronePanel(){
  const panel=document.getElementById('drone-panel');
  if(drones.length===0){panel.innerHTML='';return;}
  panel.innerHTML=drones.map(d=>'<div class="drone-line" style="color:#'+(d.idx%2===0?'0ff':'f80')+'">🛸 D'+(d.idx+1)+'</div>').join('');
}
function showLevelSplash(lv){const el=document.getElementById('lv-splash');el.textContent='⬆ LV '+lv+' ⬆';el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='lvPop 1.8s ease-out forwards';setTimeout(()=>{el.style.display='none';},1800);}
function showMsg(text,color,duration){const el=document.getElementById('msg');el.textContent=text;el.style.color=color||'#FFD700';el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='lvPop 1.5s ease-out forwards';setTimeout(()=>{el.style.display='none';},duration||2000);}
function showKillFeed(text){const el=document.getElementById('killfeed');const div=document.createElement('div');div.textContent=text;div.style.color='#0f8';div.style.transition='opacity 1s';el.appendChild(div);setTimeout(()=>{div.style.opacity='0';setTimeout(()=>div.remove(),1000);},2000);}
let gameRunning=false,lastTime=0;
function startGame(){
  ensureAudio();
  G.lv=1;G.xp=0;G.score=0;G.kills=0;G.hp=100;G.maxHp=100;G.def=0;G.spd=0;G.dualPistol=false;G.clownCount=0;
  player.yaw=0;player.pitch=0;player.invincible=0;player.speed=5.5;
  camera.position.set(0,1.7,20);
  for(const e of[...enemies])scene.remove(e.mesh);
  enemies.length=0;enemyMeshes.length=0;
  for(const m of[...missiles]){scene.remove(m.mesh);scene.remove(m.light);}missiles.length=0;
  for(const m of[...enemyMissiles]){scene.remove(m.mesh);scene.remove(m.light);}enemyMissiles.length=0;
  for(const p of[...particles])scene.remove(p.mesh);particles.length=0;
  for(const d of[...drones])scene.remove(d.mesh);drones.length=0;
  bossActive=false;bossWarnTimer=0;enemySpawnTimer=1.0;spawnInterval=2.0;gameRunning=true;
  buildWeapons();updateHUD();updateBuffIndicator();
  document.getElementById('menu').style.display='none';
  document.getElementById('clown-bar').style.display='none';
  document.getElementById('drop-pickup').style.display='none';
  canvas.requestPointerLock();requestAnimationFrame(gameLoop);
}
function gameOver(){gameRunning=false;showMsg('GAME OVER\n分數: '+G.score.toLocaleString()+'\nLv: '+G.lv,'#f44',5000);setTimeout(()=>{document.getElementById('menu').style.display='flex';},2500);}
function gameLoop(timestamp){
  if(!gameRunning)return;
  const dt=Math.min((timestamp-lastTime)/1000,0.05);lastTime=timestamp;
  if(!dropPending){updatePlayer(dt);updateEnemies(dt);updateDrones(dt);updateMissiles(dt);updateParticles(dt);updateDamageFlash(dt);updateEnemyMissiles(dt);}
  if(bossWarnTimer>0){bossWarnTimer-=dt;if(bossWarnTimer<=0&&!dropPending)triggerBoss();}
  if(player.invincible>0){camera.visible=Math.floor(player.invincible*20)%2===0;}else{camera.visible=true;}
  renderer.render(scene,camera);requestAnimationFrame(gameLoop);
}
document.getElementById('startBtn').addEventListener('click',startGame);
const styleEl=document.createElement('style');
styleEl.textContent='@keyframes lvPop{0%{transform:translate(-50%,-50%) scale(0.4);opacity:0}20%{transform:translate(-50%,-50%) scale(1.3);opacity:1}60%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}';
document.head.appendChild(styleEl);
let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;ensureAudio();shoot();}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(e.touches.length===1){const dx=e.touches[0].clientX-touchStartX,dy=e.touches[0].clientY-touchStartY;const sens=0.004;player.yaw-=dx*sens;player.pitch-=dy*sens;player.pitch=Math.max(-Math.PI*0.4,Math.min(Math.PI*0.4,player.pitch));touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;}},{passive:true});
function renderMenu(){if(!gameRunning)renderer.render(scene,camera);requestAnimationFrame(renderMenu);}
renderMenu();
</script>
